.op-fullscreen .op-body{flex:1;overflow:auto;padding:8px}

.input-s{border:1px solid #d1d5db;border-radius:8px;padding:5px 8px;font-size:12px;width:100%}

.btn-primary:hover{background:#1d4ed8}
.btn-danger{background:#dc2626;color:#fff;border:none;border-radius:8px;padding:6px 16px;font-size:12px;font-weight:700;cursor:pointer}
.btn-ghost{background:none;border:1px solid #d1d5db;border-radius:8px;padding:6px 16px;font-size:12px;cursor:pointer;color:#374151}
.shift-grid{position:relative;overflow:auto;max-height:400px}
.shift-grid table{border-collapse:collapse}
.shift-grid th,.shift-grid td{border:1px solid #d1d5db}
.shift-grid thead th{position:sticky;top:0;z-index:2}
.shift-col{position:sticky;left:0;z-index:3;background:#fff}
.shift-col-header{position:sticky;left:0;z-index:4;background:#D2B48C}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

<script type="text/babel">

/* ===== Supabase DB ヘルパー ===== */
function dbLog(op,ok,detail){console.log(`[DB ${ok?"✓":"✗"}] ${op}`,detail||"");}
const DB = {
  // --- 予約 ---
  async fetchReservations(){if(!sb)return[];const{data,error}=await sb.from("reservations").select("*");if(error){dbLog("fetchRes",false,error.message);return[];}dbLog("fetchRes",true,data.length+"件");return(data||[]).map(DB._fromDbRes);},
  async upsertReservations(arr){if(!sb||!arr.length)return;const rows=arr.map(DB._toDbRes);const{error}=await sb.from("reservations").upsert(rows,{onConflict:"id"});if(error)dbLog("upsertRes",false,error.message);else dbLog("upsertRes",true,arr.length+"件保存");},
  async deleteReservations(ids){if(!sb||!ids.length)return;const{error}=await sb.from("reservations").delete().in("id",ids);if(error)dbLog("deleteRes",false,error.message);else dbLog("deleteRes",true,ids.length+"件削除");},
  _toDbRes(r){return{id:r.id,ota:r.ota,name:r.name,lend_date:r.lendDate,lend_time:r.lendTime,return_date:r.returnDate,return_time:r.returnTime,people:r.people,vehicle:r.vehicle,insurance:r.insurance,tel:r.tel,mail:r.mail,price:r.price,status:r.status,visit_type:r.visitType,return_type:r.returnType,del_time:r.delTime||"",del_place:r.delPlace||"",col_time:r.colTime||"",col_place:r.colPlace||"",flight:r.flight||"",opt_b:!!r.optB,opt_c:!!r.optC,opt_j:!!r.optJ,opt_usb:!!r.optUSB,opt_parasol:!!r.optParasol};},
  _fromDbRes(d){return{id:d.id,ota:d.ota,name:d.name,lendDate:norm(d.lend_date),lendTime:d.lend_time,returnDate:norm(d.return_date),returnTime:d.return_time,people:d.people,vehicle:d.vehicle,insurance:d.insurance,tel:d.tel,mail:d.mail,price:Number(d.price)||0,status:d.status,visitType:d.visit_type,returnType:d.return_type,delTime:d.del_time,delPlace:d.del_place,colTime:d.col_time,colPlace:d.col_place,flight:d.flight,optB:d.opt_b,optC:d.opt_c,optJ:d.opt_j,optUSB:d.opt_usb,optParasol:d.opt_parasol};},
  // --- 配車 ---
  async fetchFleet(){if(!sb)return{};const{data,error}=await sb.from("fleet").select("*");if(error){dbLog("fetchFleet",false,error.message);return{};}const f={};(data||[]).forEach(r=>f[r.reservation_id]=r.vehicle_code);dbLog("fetchFleet",true,Object.keys(f).length+"件");return f;},
  async upsertFleet(fleet){if(!sb)return;const rows=Object.entries(fleet).map(([k,v])=>({reservation_id:k,vehicle_code:v}));if(rows.length){const{error}=await sb.from("fleet").upsert(rows,{onConflict:"reservation_id"});if(error)dbLog("upsertFleet",false,error.message);else dbLog("upsertFleet",true,rows.length+"件");}},
  async updateFleetOne(resId,code){if(!sb)return;const{error}=await sb.from("fleet").upsert({reservation_id:resId,vehicle_code:code},{onConflict:"reservation_id"});if(error)dbLog("updateFleet1",false,error.message);},
  async deleteFleetOne(resId){if(!sb)return;const{error}=await sb.from("fleet").delete().eq("reservation_id",resId);if(error)dbLog("deleteFleet1",false,error.message);},
  // --- タスク（localStorage併用で確実に保存） ---
  _lsKey(date){return"spk_tasks_"+date;},
  _lsSave(tasks,date){try{localStorage.setItem(DB._lsKey(date),JSON.stringify(tasks));}catch(e){}},
  _lsLoad(date){try{const s=localStorage.getItem(DB._lsKey(date));return s?JSON.parse(s):null;}catch(e){return null;}},
  _pendingSave:0,
  _hasChangedCol:null, // null=未チェック, true=あり, false=なし
  async fetchTasks(date){
    if(!sb){return DB._lsLoad(date)||[];}
    const{data,error}=await sb.from("tasks").select("*").eq("date",date).order("sort_order");
    if(error){dbLog("fetchTasks",false,error.message);return DB._lsLoad(date)||[];}
    const tasks=(data||[]).map(DB._fromDbTask);
    // ★ 保存中の場合はlocalStorageを上書きしない（保存中のデータが消えるのを防ぐ）
    if(tasks.length&&DB._pendingSave<=0)DB._lsSave(tasks,date);
    // ★ changed_jsonカラムの存在を自動検出（初回のみ）
    if(DB._hasChangedCol===null&&data&&data.length>0){
      DB._hasChangedCol="changed_json" in data[0];
      dbLog("changed_col_detect",true,DB._hasChangedCol?"あり":"なし");
    }
    return tasks;
  },
  // 3段階保存: full → mid(changed_json付きmin) → bare(changed_jsonなしmin)
  _toDbTaskBare(t,date,i){return{_id:t._id,date:date,type:t.type||"",time:t.time||"",name:t.name||"",assignee:t.assignee||"",done:!!t.done,memo:t.memo||"",reservation_id:t.reservationId||"",ota:t.ota||"",tel:t.tel||"",mail:t.mail||"",assigned_vehicle:t.assignedVehicle||"",plate_no:t.plateNo||"",people:t.people||0,place:t.place||"",vehicle:t.vehicle||"",insurance:t.insurance||"",insurance_change:t.insuranceChange||"",flight:t.flight||"",return_date:t.returnDate||"",return_time:t.returnTime||"",return_type:t.returnType||"",col_place:t.colPlace||"",sort_order:i};},
  _toDbTaskMin(t,date,i){const b=DB._toDbTaskBare(t,date,i);b.changed_json=JSON.stringify(t._changed||{});b.assignee_custom=!!t._assigneeCustom;b.time_changed=!!t._timeChanged;return b;},
  _dbSaveOk:true,
  // ★ 3段階フォールバック保存関数
  async _upsertWithFallback(rows,label){
    if(!sb||!rows.length)return;
    // 1) フル保存
    const{error}=await sb.from("tasks").upsert(rows,{onConflict:"_id"});
    if(!error){DB._dbSaveOk=true;DB._hasChangedCol=true;return;}
    dbLog(label,false,error.message);
    // 2) changed_jsonカラムが使えない場合を考慮してbare保存
    if(DB._hasChangedCol===false){
      const bareRows=rows.map(r=>{const b={...r};delete b.changed_json;delete b.assignee_custom;delete b.time_changed;delete b.opt_b;delete b.opt_c;delete b.opt_j;delete b.opt_usb;delete b.opt_parasol;delete b.yakkan;delete b.line;delete b.payment;return b;});
      const{error:e2}=await sb.from("tasks").upsert(bareRows,{onConflict:"_id"});
      if(!e2){dbLog(label+"-bare",true,"ベア保存成功");DB._dbSaveOk=true;return;}
      dbLog(label+"-bare",false,e2.message);DB._dbSaveOk=false;return;
    }
    // 3) mid保存（changed_json付き、opt系なし）
    const midRows=rows.map(r=>{const b={...r};delete b.opt_b;delete b.opt_c;delete b.opt_j;delete b.opt_usb;delete b.opt_parasol;delete b.yakkan;delete b.line;delete b.payment;return b;});
    const{error:e2}=await sb.from("tasks").upsert(midRows,{onConflict:"_id"});
    if(!e2){dbLog(label+"-mid",true,"ミッド保存成功");DB._dbSaveOk=true;return;}
    dbLog(label+"-mid",false,e2.message);
    // 4) bare保存（changed_jsonもなし）
    const bareRows=rows.map(r=>{const b={...r};delete b.changed_json;delete b.assignee_custom;delete b.time_changed;delete b.opt_b;delete b.opt_c;delete b.opt_j;delete b.opt_usb;delete b.opt_parasol;delete b.yakkan;delete b.line;delete b.payment;return b;});
    const{error:e3}=await sb.from("tasks").upsert(bareRows,{onConflict:"_id"});
    if(!e3){dbLog(label+"-bare",true,"ベア保存成功");DB._dbSaveOk=true;DB._hasChangedCol=false;}
    else{dbLog(label+"-bare",false,e3.message);DB._dbSaveOk=false;}
  },
  async upsertTasks(tasks,date){
    DB._lsSave(tasks,date);
    if(!sb||!tasks.length)return;
    DB._pendingSave++;
    try{
      const rows=tasks.map((t,i)=>DB._toDbTask(t,date,i));
      await DB._upsertWithFallback(rows,"upsertTasks");
    }finally{DB._pendingSave--;}
  },
  async updateTask(t,date){
    const ls=DB._lsLoad(date);
    if(ls){const idx=ls.findIndex(x=>x._id===t._id);if(idx>=0){ls[idx]=t;DB._lsSave(ls,date);}else{ls.push(t);DB._lsSave(ls,date);}}
    else{DB._lsSave([t],date);}
    if(!sb)return;
    DB._pendingSave++;
    try{
      const row=DB._toDbTask(t,date,t._sortOrder||0);
      await DB._upsertWithFallback([row],"updateTask");
    }finally{DB._pendingSave--;}
  },
  async deleteTasks(date){try{localStorage.removeItem(DB._lsKey(date));}catch(e){} if(!sb)return;const{error}=await sb.from("tasks").delete().eq("date",date);if(error)dbLog("deleteTasks",false,error.message);},
  async fetchTasksRange(fromDate,toDate){if(!sb)return[];const{data,error}=await sb.from("tasks").select("*").gte("date",fromDate).lte("date",toDate).order("date",{ascending:false}).order("sort_order");if(error){dbLog("fetchTasksRange",false,error.message);return[];}return(data||[]).map(r=>({...DB._fromDbTask(r),_date:r.date}));},
  _toDbTask(t,date,i){return{_id:t._id,date:date,type:t.type||"",time:t.time||"",name:t.name||"",assignee:t.assignee||"",done:!!t.done,memo:t.memo||"",reservation_id:t.reservationId||"",ota:t.ota||"",tel:t.tel||"",mail:t.mail||"",assigned_vehicle:t.assignedVehicle||"",plate_no:t.plateNo||"",people:t.people||0,place:t.place||"",vehicle:t.vehicle||"",insurance:t.insurance||"",insurance_change:t.insuranceChange||"",flight:t.flight||"",return_date:t.returnDate||"",return_time:t.returnTime||"",return_type:t.returnType||"",col_place:t.colPlace||"",opt_b:!!t.opts?.b,opt_c:!!t.opts?.c,opt_j:!!t.opts?.j,opt_usb:!!t.opts?.usb,opt_parasol:!!t.opts?.parasol,yakkan:!!t.yakkan,line:!!t.line,payment:!!t.payment,sort_order:i,assignee_custom:!!t._assigneeCustom,time_changed:!!t._timeChanged,changed_json:JSON.stringify(t._changed||{})};},
  _fromDbTask(d){const ch=(()=>{try{const p=JSON.parse(d.changed_json||"{}");return Object.keys(p).length?p:undefined;}catch(e){return undefined;}})();return{_id:d._id,type:d.type,time:d.time,name:d.name,assignee:d.assignee,done:d.done,memo:d.memo,reservationId:d.reservation_id,ota:d.ota,tel:d.tel,mail:d.mail,assignedVehicle:d.assigned_vehicle,plateNo:d.plate_no,people:d.people,place:d.place,vehicle:d.vehicle,insurance:d.insurance,insuranceChange:d.insurance_change,flight:d.flight,returnDate:norm(d.return_date),returnTime:d.return_time,returnType:d.return_type,colPlace:d.col_place,opts:{b:d.opt_b,c:d.opt_c,j:d.opt_j,usb:d.opt_usb,parasol:d.opt_parasol},yakkan:d.yakkan,line:d.line,payment:d.payment,_sortOrder:d.sort_order,_assigneeCustom:d.assignee_custom,_timeChanged:d.time_changed,_changed:ch};},
  // --- スタッフ ---
  async fetchStaff(){if(!sb)return null;const{data,error}=await sb.from("staff").select("*").order("sort_order");if(error){dbLog("fetchStaff",false,error.message);return null;}dbLog("fetchStaff",true,data.length+"件");return(data||[]).map(s=>({name:s.name,type:s.type,memo:s.memo||""}));},
  async saveStaff(arr){if(!sb)return;const rows=arr.map((s,i)=>({name:s.name,type:s.type,memo:s.memo||"",sort_order:i,active:true}));const{error}=await sb.from("staff").upsert(rows,{onConflict:"name"});if(error)dbLog("saveStaff",false,error.message);else dbLog("saveStaff",true,arr.length+"件保存");},
  async deleteStaff(name){if(!sb)return;const{error}=await sb.from("staff").delete().eq("name",name);if(error)dbLog("deleteStaff",false,error.message);else dbLog("deleteStaff",true,name);},
  // --- 車両 ---
  async fetchVehicles(){if(!sb)return null;const{data,error}=await sb.from("vehicles").select("*");if(error){dbLog("fetchVehicles",false,error.message);return null;}dbLog("fetchVehicles",true,data.length+"件");return(data||[]).map(v=>({id:"v"+v.id,code:v.code,name:v.name,no:v.plate_no,type:v.type,seats:v.seats}));},
  async saveVehicles(arr){if(!sb)return;const rows=arr.map(v=>({code:v.code,name:v.name,plate_no:v.no,type:v.type,seats:v.seats}));const{error}=await sb.from("vehicles").upsert(rows,{onConflict:"code"});if(error)dbLog("saveVehicles",false,error.message);else dbLog("saveVehicles",true,arr.length+"件保存");},
  async deleteVehicle(code){if(!sb)return;const{error}=await sb.from("vehicles").delete().eq("code",code);if(error)dbLog("deleteVehicle",false,error.message);else dbLog("deleteVehicle",true,code);},
  // --- シフト ---
  async fetchShifts(){if(!sb)return null;const{data}=await sb.from("shifts").select("*");const s={};(data||[]).forEach(r=>{if(!s[r.date])s[r.date]=[];s[r.date].push({name:r.staff_name,symbol:r.symbol,start:r.start_time,end:r.end_time,memo:r.memo});});return s;},
  async saveShift(date,staffName,shift){if(!sb)return;await sb.from("shifts").upsert({date,staff_name:staffName,symbol:shift.symbol||"",start_time:shift.start||"",end_time:shift.end||"",memo:shift.memo||""},{onConflict:"date,staff_name"});},
  async saveShiftsForDate(date,shifts){if(!sb)return;const rows=shifts.map(s=>({date,staff_name:s.name,symbol:s.symbol||"",start_time:s.start||"",end_time:s.end||"",memo:s.memo||""}));await sb.from("shifts").upsert(rows,{onConflict:"date,staff_name"});},
  async deleteShift(date,staffName){if(!sb)return;const{error}=await sb.from("shifts").delete().eq("date",date).eq("staff_name",staffName);if(error)dbLog("deleteShift",false,error.message);else dbLog("deleteShift",true,date+"/"+staffName);},
  // --- メンテナンス ---

function parsePrice(g){return function(){for(let i=0;i<arguments.length;i++){const v=g(arguments[i]);if(v){const c=v.replace(/[,，¥￥\s円税込抜（）()\u3000]/g,"");const n=+c;if(!isNaN(n)&&n>0)return n;const m=v.match(/[\d,，]+/);if(m){const n2=+(m[0].replace(/[,，]/g,""));if(!isNaN(n2)&&n2>0)return n2;}}}return 0;};}

function makeG(r,h){
  const hNorm=h.map(s=>(s||"").replace(/[\s\u3000\uFEFF\u200B]/g,""));
  return function(n){
    // 1) exact match
    let i=h.indexOf(n);
    if(i>=0)return r[i]||"";
    // 2) normalized match（空白・全角スペース除去）
    const nn=n.replace(/[\s\u3000\uFEFF\u200B]/g,"");
    i=hNorm.indexOf(nn);
    if(i>=0)return r[i]||"";
    // 3) 部分一致（ヘッダーがnを含む or nがヘッダーを含む）
    for(let j=0;j<hNorm.length;j++){
      if(hNorm[j]&&(hNorm[j].includes(nn)||nn.includes(hNorm[j])))return r[j]||"";

}

function toLD(dt){return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");}
function fmtD(d){if(!d)return"";const s=String(d);const dt=new Date(s.length===10?s+"T00:00:00":s);if(isNaN(dt))return d;const w=["日","月","火","水","木","金","土"];return`${dt.getMonth()+1}/${dt.getDate()}(${w[dt.getDay()]})`;}
function fmtFull(d){if(!d)return"";const s=String(d);const dt=new Date(s.length===10?s+"T00:00:00":s);if(isNaN(dt))return d;const w=["日","月","火","水","木","金","土"];return`${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日(${w[dt.getDay()]})`;}
function dOff(b,n){const d=new Date(b+"T00:00:00");d.setDate(d.getDate()+n);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function norm(d){if(!d)return"";const s=String(d).replace(/\//g,"-");if(s.length<=10)return s;const dt=new Date(s);if(isNaN(dt))return s.substring(0,10);return toLD(dt);}
function sD(a,b){return norm(a)===norm(b);}
// 車両重複チェック: targetVcに対してresIdの期間と1日でもかぶる予約があるか
function checkVehicleConflict(targetVc,resId,data,fleet){
  const res=data.find(r=>r.id===resId);if(!res)return null;
  const ld=norm(res.lendDate),rd=norm(res.returnDate);
  const conflict=data.find(r=>r.id!==resId&&r.status!=="cancelled"&&fleet[r.id]===targetVc&&norm(r.lendDate)<=rd&&norm(r.returnDate)>=ld);
  return conflict||null;
}

const PLACE_SHEET_CSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vSsixHeH7WvPEhA0BqOhFcun6DgBAeB9z11ikzRgXQcB_OxKKwWT8uCvl6Fb551nYlRmBGLj0e7OcGi/pub?gid=854005754&single=true&output=csv";
function parsePlaceCSV(text){
  const lines=[];let cur="";let inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c==='"'){if(inQ&&text[i+1]==='"'){cur+='"';i++;}else{inQ=!inQ;}}
    else if(c===","&&!inQ){lines.length===0?lines.push([cur]):lines[lines.length-1].push(cur);cur="";}
    else if((c==="\n"||(c==="\r"&&text[i+1]==="\n"))&&!inQ){
      if(c==="\r")i++;
      if(lines.length===0){lines.push([cur]);lines.push([]);}else{lines[lines.length-1].push(cur);lines.push([]);}
      cur="";
    }else{cur+=c;}
  }
  if(cur||lines.length>0){if(lines.length===0)lines.push([cur]);else lines[lines.length-1].push(cur);}
  return lines.filter(r=>r.some(c=>c.trim()));
}
async function fetchPlaceData(targetResIds){
  const resp=await fetch(PLACE_SHEET_CSV);
  if(!resp.ok)throw new Error("CSV取得失敗: "+resp.status);
  const text=await resp.text();
  const rows=parsePlaceCSV(text);
  if(rows.length<2)throw new Error("データが空です");
  // I列(index8)=DEL場所, L列(index11)=COL場所, 予約番号を探す
  const header=rows[0];
  let resCol=-1;
  header.forEach((h,i)=>{if(h.includes("予約番号")||h.includes("予約ID")||h.includes("Reservation"))resCol=i;});
  if(resCol<0){
    // ヘッダーに見つからない場合、予約IDパターンで列を推定
    for(let ci=0;ci<header.length;ci++){
      const sample=rows.slice(1,Math.min(6,rows.length)).map(r=>r[ci]||"");
      if(sample.some(s=>/^[A-Z0-9]{8,}$/.test(s.trim()))){resCol=ci;break;}
    }
  }
  if(resCol<0)throw new Error("予約番号の列が見つかりません");
  const delPlaceCol=8; // I列
  const colPlaceCol=11; // L列
  const targetSet=new Set(targetResIds);
  const result={};
  rows.slice(1).forEach(r=>{
    const rid=(r[resCol]||"").trim();
    if(!rid||!targetSet.has(rid))return;
    const del=(r[delPlaceCol]||"").trim();
    const col=(r[colPlaceCol]||"").trim();
    // ★ 同じ予約番号が複数行ある場合、空欄でない情報を優先してマージ
    if(result[rid]){
      if(del&&!result[rid].delPlace)result[rid].delPlace=del;
      if(col&&!result[rid].colPlace)result[rid].colPlace=col;
    }else{
      result[rid]={delPlace:del,colPlace:col};
    }
  });
  return result;
}

/* ===== タスク生成 ===== */
function generateTasks(reservations,date,fleet,vehicles){
  const tasks=[];
  const tomorrow=dOff(date,1);
  // 翌日出発車両を収集（洗車タスク用）
  const tomorrowDELVehicles=new Set();
  reservations.forEach(r=>{
    if(sD(r.lendDate,tomorrow)&&fleet[r.id]){tomorrowDELVehicles.add(fleet[r.id]);}
  });
  reservations.forEach(r=>{
    const fv=fleet[r.id];const veh=fv?vehicles.find(v=>v.code===fv):null;
    const base={reservationId:r.id,ota:r.ota,tel:r.tel||"",mail:r.mail||"",done:false,assignee:"",memo:"",assignedVehicle:fv||"",plateNo:veh?veh.no:"",insuranceChange:"",opts:{b:!!r.optB,c:!!r.optC,j:!!r.optJ,usb:!!r.optUSB,parasol:!!r.optParasol},yakkan:false,line:false,payment:false};
    if(sD(r.lendDate,date)){tasks.push({...base,_id:uid(),type:"DEL",time:r.delTime||r.lendTime,name:r.name,people:r.people,place:r.delPlace||"",vehicle:r.vehicle,insurance:r.insurance,flight:r.flight,returnDate:r.returnDate,returnTime:r.returnTime,returnType:"COL",colPlace:r.colPlace||""});}
    if(sD(r.returnDate,date)){const place=r.colPlace||"";tasks.push({...base,_id:uid(),type:"COL",time:r.colTime||r.returnTime,name:r.name,people:r.people,place,vehicle:r.vehicle,insurance:r.insurance,flight:""});}
  });
  // 洗車タスク: 翌日DELの車両（当日返却後 or 事前準備）
  tomorrowDELVehicles.forEach(vc=>{
    const veh=vehicles.find(v=>v.code===vc);
    // 翌日の予約情報を取得
    const tRes=reservations.find(r=>sD(r.lendDate,tomorrow)&&fleet[r.id]===vc);
    if(!veh)return;
    // 重複チェック：同じ車両で既に洗車が生成されてないか
    if(tasks.find(t=>t.type==="洗車"&&t.assignedVehicle===vc))return;
    tasks.push({_id:uid(),type:"洗車",time:"",name:`翌日出発: ${tRes?tRes.name:""}`,people:0,place:"",vehicle:veh.type,insurance:"",flight:"",reservationId:tRes?tRes.id:"",ota:tRes?tRes.ota:"",tel:"",mail:"",done:false,assignee:"",memo:`${fmtD(tomorrow)} DEL ${tRes?tRes.lendTime:""} ${tRes?tRes.name:""}`,assignedVehicle:vc,plateNo:veh.no,insuranceChange:"",opts:{b:!!(tRes&&tRes.optB),c:!!(tRes&&tRes.optC),j:!!(tRes&&tRes.optJ),usb:!!(tRes&&tRes.optUSB),parasol:!!(tRes&&tRes.optParasol)},yakkan:false,line:false,payment:false,returnDate:"",returnTime:"",returnType:"",colPlace:""});
  });
  return tasks.sort((a,b)=>{
    // 洗車は最後にまとめる
    if(a.type==="洗車"&&b.type!=="洗車")return 1;
    if(a.type!=="洗車"&&b.type==="洗車")return -1;
    return(a.time||"").localeCompare(b.time||"");
  });
}

/* ===== 自動配車ロジック ===== */
function autoAssign(reservations,vehicles,existingFleet,maintenance){
  const fleet={...existingFleet};
  const maints=maintenance||[];
  const sorted=[...reservations].sort((a,b)=>norm(a.lendDate).localeCompare(norm(b.lendDate)));
  const _reasons={}; // 未配車理由のログ
  sorted.forEach(r=>{
    if(fleet[r.id])return; // 既に割当済み
    const cls=r.vehicle; // 予約のクラス
    const rL=norm(r.lendDate),rR=norm(r.returnDate);
    const candidates=vehicles.filter(v=>v.type===cls);
    if(candidates.length===0){
      _reasons[r.id]=`クラス"${cls}"の車両が登録されていません`;
      return;
    }
    let tried=[];
    for(const v of candidates){
      // メンテナンス期間と重複する車両は除外
      const inMaint=maints.some(m=>{
        if(m.vehicleCode!==v.code)return false;
        const mL=norm(m.startDate),mR=norm(m.endDate);
        return rL<=mR&&rR>=mL;
      });
      if(inMaint){tried.push(`${v.code}:メンテ中`);continue;}
      // この車両がこの期間に空いているかチェック
      const conflictRes=sorted.find(other=>{
        if(other.id===r.id)return false;
        if(fleet[other.id]!==v.code)return false;
        const oL=norm(other.lendDate),oR=norm(other.returnDate);
        return rL<=oR&&rR>=oL; // 期間重複
      });
      if(conflictRes){tried.push(`${v.code}:${conflictRes.name||conflictRes.id}と重複`);continue;}
      fleet[r.id]=v.code;break;
    }
    if(!fleet[r.id]){
      _reasons[r.id]=`${cls}クラス全${candidates.length}台が使用中(${tried.join(", ")})`;
    }
  });
  if(Object.keys(_reasons).length>0){
  }
  fleet._unassignedReasons=_reasons;
  return fleet;
}

      const sortedM=Object.entries(mBreak).sort(([a],[b])=>a.localeCompare(b));

      <div className="flex items-center gap-2 mb-3 flex-wrap">{Object.entries(files).map(([k,f])=><div key={k} className="flex items-center gap-1"><OBadge ota={k}/><span className="text-xs font-bold">{f.data.length}件</span></div>)}<span className="text-gray-400">→</span><span className="text-base font-black text-blue-700">合計 {allD.length}件 / ¥{tPrice.toLocaleString()}</span>{dupCnt>0&&<span className="text-xs text-amber-600 font-bold">（重複{dupCnt}件→price優先で統合）</span>}</div>
      <div style={{fontSize:10,color:"#475569",marginBottom:8,padding:"6px 8px",background:"#f8fafc",borderRadius:6}}>📅 返却月別: {sortedM.map(([ym,d])=><span key={ym} style={{marginRight:8}}><b>{ym.replace("-","/")}</b>:{d.cnt}件(¥{d.sum.toLocaleString()})</span>)}</div>
      <button onClick={()=>onImport(allD)} className="btn-primary" style={{padding:"10px 24px",fontSize:14}}>統合してタスクを生成 →</button>
    </div>;})()}
    <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mt-4">
      <h3 className="text-base font-bold mb-1" style={{display:"flex",alignItems:"center",gap:8}}><span style={{background:"#4f46e5",color:"#fff",borderRadius:"50%",width:24,height:24,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700}}>2</span>場所CSV取込</h3>
      <p className="text-xs text-gray-500 mb-3">予約番号でお届け場所・回収場所を一括更新 → OPシートにGoogleマップリンク付きで表示されます<br/>CSVフォーマット: 予約番号, お届け場所, 回収場所{dataCount===0&&<span style={{color:"#b45309",fontWeight:600}}><br/>※ Step 1のCSV取込後にマッチングされます（先に読み込みも可能）</span>}</p>
      <div className="flex items-center gap-3 flex-wrap">
        <label className="px-4 py-2 rounded-lg text-xs font-semibold border-2 border-dashed border-indigo-300 bg-indigo-50 text-indigo-700 cursor-pointer hover:bg-indigo-100"><span>📍 場所CSVを選択</span><input type="file" accept=".csv,.txt,.tsv" className="hidden" onChange={e=>{
          const f=e.target.files?.[0];if(!f)return;
          readFile(f,text=>{
            const rows=parseCSV(text);if(rows.length<2){setPlaceLogs([{t:"err",m:"CSVが空です"}]);return;}
            // ヘッダー行を自動検出（最初の10行以内で「予約番号」を含む行を探す）
            let hdIdx=-1,hd=null;
            for(let hi=0;hi<Math.min(rows.length,10);hi++){
              if(rows[hi].some(h=>h&&(h.includes("予約番号")||h==="ID"||h==="id"))){hdIdx=hi;hd=rows[hi];break;}
            }
            if(!hd){setPlaceLogs([{t:"err",m:"「予約番号」列が見つかりません"}]);return;}
            const idxId=hd.findIndex(h=>h.includes("予約番号")||h==="ID"||h==="id");
            const idxDel=hd.findIndex(h=>h.includes("届け")||(h.includes("場所")&&!h.includes("回収")&&!h.includes("返却")));
            const idxCol=hd.findIndex(h=>h.includes("回収")||h.includes("返却場所"));
            if(idxId<0){setPlaceLogs([{t:"err",m:"「予約番号」列が見つかりません"}]);return;}
            const places={};let cnt=0;
            for(let i=hdIdx+1;i<rows.length;i++){
              const r=rows[i];const rid=r[idxId]?.trim();if(!rid)continue;
              const del=idxDel>=0?r[idxDel]?.trim()||"":"";
              const col=idxCol>=0?r[idxCol]?.trim()||"":"";
              if(del||col){places[rid]={delPlace:del,colPlace:col};cnt++;}
            }
            if(cnt===0){setPlaceLogs([{t:"err",m:"有効なデータがありません"}]);return;}
            const now2=new Date();const ts2=`${now2.getMonth()+1}/${now2.getDate()} ${String(now2.getHours()).padStart(2,"0")}:${String(now2.getMinutes()).padStart(2,"0")}`;
            onSetPendingPlaces(places);
            if(dataCount>0){const result=onUpdatePlaces(places);setPlaceLogs([{t:"ok",m:`[${ts2}] ${f.name}: ${cnt}件読込 → ${result.matched}件マッチ, ${result.unmatched}件未マッチ`}]);}
            else{setPlaceLogs([{t:"ok",m:`[${ts2}] ${f.name}: ${cnt}件読込済み（Step 1のCSV取込後に自動マッチングされます）`}]);}
          });
        }}/></label>
        <span className="text-xs text-gray-400">予約番号 + お届け場所 + 回収場所</span>
      </div>
      {placeLogs.length>0&&<div className="mt-2">{placeLogs.map((l,i)=><div key={i} className="text-xs px-2 py-1 rounded mb-1" style={{background:l.t==="err"?"#fef2f2":"#f0fdf4",color:l.t==="err"?"#b91c1c":"#15803d"}}>{l.t==="err"?"✗":"✓"} {l.m}</div>)}</div>}
      {pendingPlaces&&Object.keys(pendingPlaces).length>0&&dataCount===0&&<div className="mt-2 px-2 py-1 rounded text-xs" style={{background:"#fef3c7",color:"#92400e"}}>📍 場所データ {Object.keys(pendingPlaces).length}件 読込済み — Step 1のインポート待ち</div>}
    </div>
  </div>;
}

/* ==========================================
   車両管理画面
   ========================================== */
function VehicleManager({vehicles,onVehiclesChange,vehicleClasses,onDeleteVehicle}){
  const[editId,setEditId]=useState(null);
  const[form,setForm]=useState({name:"",no:"",type:"A",seats:5});
  const[addMode,setAddMode]=useState(false);

  const startEdit=(v)=>{setEditId(v.id);setForm({name:v.name,no:v.no,type:v.type,seats:v.seats});};
  const save=()=>{
    if(editId){
      onVehiclesChange(vehicles.map(v=>v.id===editId?{...v,name:form.name,no:form.no,type:form.type,seats:+form.seats,code:form.name.replace(/[\s-]/g,"").substring(0,3).toUpperCase()||v.code}:v));
      setEditId(null);
    }
  };
  const addNew=()=>{
    const code=form.name.replace(/[\s-]/g,"").substring(0,3).toUpperCase()||"NEW";
    onVehiclesChange([...vehicles,{id:vuid(),code,name:form.name,no:form.no,type:form.type,seats:+form.seats}]);
    setForm({name:"",no:"",type:"A",seats:5});setAddMode(false);
  };
  const remove=(id)=>{const v=vehicles.find(x=>x.id===id);onVehiclesChange(vehicles.filter(x=>x.id!==id));if(v&&onDeleteVehicle)onDeleteVehicle(v.code);};

  const grouped=useMemo(()=>{
    return vehicleClasses.map(vc=>({...vc,items:vehicles.filter(v=>v.type===vc.type)}));
  },[vehicles,vehicleClasses]);

  return <div style={{maxWidth:800,margin:"0 auto"}}>
    <div className="flex items-center justify-between mb-3">
      <h3 className="text-base font-bold text-gray-800">車両登録管理</h3>
      <button onClick={()=>{setAddMode(true);setEditId(null);setForm({name:"",no:"",type:"A",seats:5});}} className="btn-primary">＋ 車両追加</button>
    </div>

    {(addMode||editId)&&<div className="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-4">
      <h4 className="font-bold text-sm mb-2 text-blue-800">{editId?"車両を編集":"新規車両登録"}</h4>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 80px",gap:8}}>
        <div><label className="text-xs text-gray-600">クラス</label><select value={form.type} onChange={e=>setForm({...form,type:e.target.value})} className="input-s">{vehicleClasses.map(c=><option key={c.type} value={c.type}>{c.type}クラス</option>)}</select></div>
        <div><label className="text-xs text-gray-600">車種</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} className="input-s" placeholder="ヴェルファイア"/></div>
        <div><label className="text-xs text-gray-600">ナンバー</label><input value={form.no} onChange={e=>setForm({...form,no:e.target.value})} className="input-s" placeholder="7673"/></div>
        <div><label className="text-xs text-gray-600">定員</label><input type="number" value={form.seats} onChange={e=>setForm({...form,seats:e.target.value})} className="input-s"/></div>
      </div>
      <div className="flex gap-2 mt-3">
        {editId?<button onClick={save} className="btn-primary">保存</button>:<button onClick={addNew} className="btn-primary">登録</button>}
        <button onClick={()=>{setEditId(null);setAddMode(false);}} className="btn-ghost">キャンセル</button>
      </div>
    </div>}

    {grouped.map(g=><div key={g.type} className="mb-3">
      <div className="flex items-center gap-2 mb-1">
        <span className="text-xs font-bold text-white px-2 py-0.5 rounded" style={{background:"#2563eb"}}>{g.type}</span>
        <span className="text-xs text-gray-600 font-semibold">{g.label}</span>
        <span className="text-xs text-gray-400">({g.items.length}台)</span>
      </div>
      {g.items.length===0?<div className="text-xs text-gray-400 pl-4 mb-2">車両未登録</div>:
      <div className="bg-white rounded-lg border border-gray-200 overflow-hidden mb-2">
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:"#f8fafc"}}><th className="px-3 py-1.5 text-left text-xs font-semibold text-gray-500 border-b">車種</th><th className="px-3 py-1.5 text-left text-xs font-semibold text-gray-500 border-b">ナンバー</th><th className="px-3 py-1.5 text-center text-xs font-semibold text-gray-500 border-b">定員</th><th className="px-3 py-1.5 text-right text-xs font-semibold text-gray-500 border-b">操作</th></tr></thead>
          <tbody>{g.items.map(v=><tr key={v.id} className="border-b border-gray-100 hover:bg-blue-50">
            <td className="px-3 py-1.5 font-semibold">{v.name}</td>
            <td className="px-3 py-1.5 font-mono font-bold" style={{color:"#2563eb"}}>{v.no}</td>
            <td className="px-3 py-1.5 text-center">{v.seats}名</td>
            <td className="px-3 py-1.5 text-right">
              <button onClick={()=>startEdit(v)} className="text-xs text-blue-600 hover:underline mr-2">編集</button>
              <button onClick={()=>remove(v.id)} className="text-xs text-red-500 hover:underline">削除</button>
            </td>
          </tr>)}</tbody>
        </table>
      </div>}
    </div>)}
    <div className="text-xs text-gray-400 mt-4">合計: {vehicles.length}台</div>
  </div>;
}

          <input value={formLog.description} onChange={e=>setFormLog({...formLog,description:e.target.value})} placeholder="内容・備考" className="input-s"/>
          <input type="number" value={formLog.cost} onChange={e=>setFormLog({...formLog,cost:e.target.value})} placeholder="費用（円）" className="input-s"/>
        </div>
        <button onClick={addLog} className="btn-primary">記録を追加</button>
      </div>
      <div style={{background:"white",borderRadius:8,border:"1px solid #e2e8f0",overflow:"hidden"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
          <thead><tr style={{background:"#f8fafc"}}><th className="px-3 py-2 text-left text-xs font-semibold">日付</th><th className="px-3 py-2 text-left text-xs font-semibold">車名</th><th className="px-3 py-2 text-left text-xs font-semibold">種類</th><th className="px-3 py-2 text-right text-xs font-semibold">走行距離</th><th className="px-3 py-2 text-right text-xs font-semibold">費用</th><th className="px-3 py-2 text-left text-xs font-semibold">内容</th><th className="px-3 py-2 text-right text-xs font-semibold">操作</th></tr></thead>
          <tbody>{(logs||[]).map(function(l,idx){var car=cars.find(function(c){return c.id===l.car_id});return <tr key={l.id||idx} className="border-t border-gray-100 hover:bg-blue-50">
            <td className="px-3 py-2">{l.date||""}</td>
            <td className="px-3 py-2">{(car&&car.name)||"-"}</td>
            <td className="px-3 py-2"><span style={{fontSize:10,padding:"2px 6px",borderRadius:3,background:"#dbeafe",color:"#1e40af"}}>{l.type||""}</span></td>
            <td className="px-3 py-2 text-right font-mono">{l.mileage?Number(l.mileage).toLocaleString():"-"}</td>
            <td className="px-3 py-2 text-right font-mono">¥{Number(l.cost||0).toLocaleString()}</td>
            <td className="px-3 py-2 text-xs text-gray-600">{l.description||""}</td>
            <td className="px-3 py-2 text-right"><button onClick={function(){delLog(l.id)}} style={{fontSize:11,color:"#dc2626",background:"none",border:"none",cursor:"pointer"}}>削除</button></td>
          </tr>})}
          </tbody>
        </table>
      </div>
    </div>}
  </div>;
}

/* ==========================================
   スタッフ管理
   ========================================== */
function StaffManager({staff,onStaffChange,onDeleteStaff}){
  const[editId,setEditId]=useState(null);
  const[form,setForm]=useState({name:"",type:"正社員",memo:""});
  const[adding,setAdding]=useState(false);

  const[editOrigName,setEditOrigName]=useState("");
  const save=()=>{
    if(!form.name.trim())return;
    if(adding){
      onStaffChange([...staff,{name:form.name.trim(),type:form.type,memo:form.memo}]);
      setAdding(false);
    }else if(editId!==null){
      const oldName=editOrigName;
      const newName=form.name.trim();
      const updated=[...staff];
      updated[editId]={name:newName,type:form.type,memo:form.memo};
      onStaffChange(updated);
      // 名前が変わった場合、旧レコードをDBから削除
      if(oldName&&oldName!==newName&&onDeleteStaff)onDeleteStaff(oldName);
      setEditId(null);setEditOrigName("");
    }
    setForm({name:"",type:"正社員",memo:""});
  };

  const startEdit=(i)=>{setEditId(i);setEditOrigName(staff[i].name);setForm({...staff[i]});setAdding(false);};
  const startAdd=()=>{setForm({name:"",type:"正社員",memo:""});setAdding(true);setEditId(null);};
  const remove=(i)=>{if(window.confirm(`${staff[i].name} を削除しますか？`)){const name=staff[i].name;onStaffChange(staff.filter((_,j)=>j!==i));if(onDeleteStaff)onDeleteStaff(name);}};
  const cancel=()=>{setAdding(false);setEditId(null);setForm({name:"",type:"正社員",memo:""});};

  const sorted=[...staff.map((s,i)=>({...s,_i:i}))].sort((a,b)=>{
    if(a.type==="正社員"&&b.type!=="正社員")return -1;
    if(a.type!=="正社員"&&b.type==="正社員")return 1;
    return 0;
  });

  const regularCount=staff.filter(s=>s.type==="正社員").length;
  const partCount=staff.filter(s=>s.type==="アルバイト").length;

  return <div style={{maxWidth:640,margin:"0 auto"}}>
    <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div className="px-4 py-3 border-b border-gray-200 flex items-center justify-between" style={{background:"#f8fafc"}}>
        <div>
          <h3 className="text-base font-bold text-gray-800" style={{margin:0}}>スタッフ名簿</h3>
          <div className="text-xs text-gray-500 mt-0.5">正社員 {regularCount}名 / アルバイト {partCount}名</div>
        </div>
        <button onClick={startAdd} className="btn-primary">＋ スタッフ追加</button>
      </div>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
        <thead><tr style={{background:"#f1f5f9"}}>{["区分","名前","メモ","操作"].map(h=><th key={h} style={{padding:"8px 12px",textAlign:"left",fontWeight:600,fontSize:10,color:"#475569",borderBottom:"2px solid #cbd5e1"}}>{h}</th>)}</tr></thead>
        <tbody>
          {adding&&<tr style={{background:"#eff6ff"}}><td style={{padding:"6px 12px",borderBottom:"1px solid #e2e8f0"}}><select value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))} className="input-s" style={{width:90,fontSize:11}}><option>正社員</option><option>アルバイト</option></select></td><td style={{padding:"6px 12px",borderBottom:"1px solid #e2e8f0"}}><input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="名前" className="input-s" style={{width:100,fontSize:11}} autoFocus/></td><td style={{padding:"6px 12px",borderBottom:"1px solid #e2e8f0"}}><input value={form.memo} onChange={e=>setForm(p=>({...p,memo:e.target.value}))} placeholder="メモ" className="input-s" style={{fontSize:11}}/></td><td style={{padding:"6px 12px",borderBottom:"1px solid #e2e8f0"}}><div className="flex gap-1"><button onClick={save} className="px-2 py-1 bg-blue-600 text-white rounded text-xs font-bold">保存</button><button onClick={cancel} className="px-2 py-1 bg-gray-100 text-gray-600 rounded text-xs">取消</button></div></td></tr>}
          {sorted.map(s=>{const isEdit=editId===s._i;const isReg=s.type==="正社員";
            return <tr key={s._i} style={{background:isEdit?"#eff6ff":"transparent"}}>
              <td style={{padding:"6px 12px",borderBottom:"1px solid #e2e8f0"}}>{isEdit?<select value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))} className="input-s" style={{width:90,fontSize:11}}><option>正社員</option><option>アルバイト</option></select>:<span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:4,background:isReg?"#dbeafe":"#fef3c7",color:isReg?"#1d4ed8":"#92400e"}}>{s.type}</span>}</td>
              <td style={{padding:"6px 12px",borderBottom:"1px solid #e2e8f0",fontWeight:600}}>{isEdit?<input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} className="input-s" style={{width:100,fontSize:11}}/>:s.name}</td>
              <td style={{padding:"6px 12px",borderBottom:"1px solid #e2e8f0",color:"#64748b",fontSize:11}}>{isEdit?<input value={form.memo} onChange={e=>setForm(p=>({...p,memo:e.target.value}))} className="input-s" style={{fontSize:11}}/>:(s.memo||"—")}</td>
              <td style={{padding:"6px 12px",borderBottom:"1px solid #e2e8f0"}}>{isEdit?<div className="flex gap-1"><button onClick={save} className="px-2 py-1 bg-blue-600 text-white rounded text-xs font-bold">保存</button><button onClick={cancel} className="px-2 py-1 bg-gray-100 text-gray-600 rounded text-xs">取消</button></div>:<div className="flex gap-1"><button onClick={()=>startEdit(s._i)} className="px-2 py-1 bg-gray-100 text-gray-600 rounded text-xs hover:bg-gray-200">編集</button><button onClick={()=>remove(s._i)} className="px-2 py-1 bg-red-50 text-red-600 rounded text-xs hover:bg-red-100">削除</button></div>}</td>
            </tr>;})}
        </tbody>
      </table>
    </div>
  </div>;
}

/* ==========================================
   出勤簿（月次カレンダー+ CSV取込）
   ========================================== */
function ShiftCalendar({shifts,onShiftsChange,today,staff,sbSaveShift}){
  const todayYM=toYM(today);const[viewYM,setViewYM]=useState(todayYM);const WK=["日","月","火","水","木","金","土"];
  const SYMBOLS=["●","希","公","出",""];
  const maxYM=ymOff(todayYM,3);const dim=daysInMonth(viewYM);const[y,mo]=viewYM.split("-").map(Number);
  const getShift=(date)=>shifts[date]||[];
  const regularStaff=staff.filter(s=>s.type==="正社員");const partTimeStaff=staff.filter(s=>s.type==="アルバイト");
  const[editTime,setEditTime]=useState(null);
  const[selCells,setSelCells]=useState([]); // [{dateStr,name},...] 選択中セル群
  const[clipData,setClipData]=useState(null); // コピーしたシンボル配列 ["●","希",...]
  // Supabase同期付きシフト更新
  const updateShifts=(next)=>{onShiftsChange(next);if(sbSaveShift){Object.entries(next).forEach(([date,arr])=>{if(arr!==shifts[date]){
    // 新しい配列のスタッフ名セット
    const newNames=new Set(arr.map(s=>s.name));
    // 古い配列から消えたスタッフをDBから削除
    const prev=shifts[date]||[];
    prev.forEach(s=>{if(!newNames.has(s.name))DB.deleteShift(date,s.name);});
    // 残りを保存
    arr.forEach(s=>sbSaveShift(date,s.name,s));
  }});}};
  const _onSC=updateShifts;

  // Cmd+C / Cmd+V キーボードハンドラ
  React.useEffect(()=>{
    const handler=(e)=>{
      const isMeta=e.metaKey||e.ctrlKey;
      if(isMeta&&e.key==="c"&&selCells.length>0){
        e.preventDefault();
        // 選択セルのシンボルを日付順にコピー
        const sorted=[...selCells].sort((a,b)=>a.dateStr.localeCompare(b.dateStr));
        const syms=sorted.map(c=>{const sh=getShift(c.dateStr).find(s=>s.name===c.name);return sh?sh.symbol||"":"";});
        setClipData({symbols:syms,name:sorted[0].name});
      }
      if(isMeta&&e.key==="v"&&clipData&&selCells.length>0){
        e.preventDefault();
        // 選択位置から右方向へペースト
        const anchor=selCells[0];const startIdx=dates.indexOf(anchor.dateStr);
        if(startIdx<0)return;
        const next={...shifts};
        clipData.symbols.forEach((sym,i)=>{
          const ds=dates[startIdx+i];if(!ds)return;
          const cur=next[ds]||[];const idx=cur.findIndex(s=>s.name===anchor.name);
          if(idx>=0){const updated=[...cur];updated[idx]={...cur[idx],symbol:sym};next[ds]=updated;}
          else{next[ds]=[...cur,{name:anchor.name,type:"正社員",symbol:sym,start:"09:00",end:"18:00"}];}
        });
        _onSC(next);
      }
      if(e.key==="Escape"){setSelCells([]);}
    };
    window.addEventListener("keydown",handler);
    return()=>window.removeEventListener("keydown",handler);
  },[selCells,clipData,shifts,dates]);

  const handleCellClick=(e,dateStr,name,type)=>{
    if(type==="正社員"){
      if(e.shiftKey&&selCells.length>0&&selCells[0].name===name){
        // Shift+クリック: 同じスタッフ行で範囲選択
        const anchor=selCells[0].dateStr;
        const i1=dates.indexOf(anchor),i2=dates.indexOf(dateStr);
        const lo=Math.min(i1,i2),hi=Math.max(i1,i2);
        setSelCells(dates.slice(lo,hi+1).map(ds=>({dateStr:ds,name})));
        return;
      }
      if(e.ctrlKey||e.metaKey){
        // Ctrl/Cmd+クリック: セル選択のみ（コピペ用）
        setSelCells([{dateStr,name}]);
        return;
      }
      // 通常クリック: シンボル切替（従来動作）
      const cur=getShift(dateStr);const idx=cur.findIndex(s=>s.name===name);
      if(idx>=0){
        const shift=cur[idx];const symIdx=SYMBOLS.indexOf(shift.symbol||"");const nextSym=symIdx>=0?SYMBOLS[(symIdx+1)%SYMBOLS.length]:"●";
        if(nextSym===""){
          // 空シンボル = シフト削除（レコードをDBからも消す）
          _onSC({...shifts,[dateStr]:cur.filter(s=>s.name!==name)});
        }else{
          const updated=[...cur];updated[idx]={...shift,symbol:nextSym};_onSC({...shifts,[dateStr]:updated});
        }
      }else{
        const newShift={name,type,symbol:"●",start:"09:00",end:"18:00"};_onSC({...shifts,[dateStr]:[...cur,newShift]});
      }
      // クリックしたセルも選択状態に（コピペ用）
      setSelCells([{dateStr,name}]);
      return;
    }
    // アルバイト
    const cur=getShift(dateStr);const idx=cur.findIndex(s=>s.name===name);
    if(idx>=0){
      _onSC({...shifts,[dateStr]:cur.filter(s=>s.name!==name)});
    }else{
      const newShift={name,type,symbol:"",start:"09:00",end:"18:00"};_onSC({...shifts,[dateStr]:[...cur,newShift]});
    }
  };
  const isCellSelected=(ds,name)=>selCells.some(c=>c.dateStr===ds&&c.name===name);

  const handleTimeChange=(dateStr,name,startTime,endTime)=>{
    const cur=getShift(dateStr);const idx=cur.findIndex(s=>s.name===name);
    if(idx>=0){const updated=[...cur];updated[idx]={...cur[idx],start:startTime,end:endTime};_onSC({...shifts,[dateStr]:updated});}
  };

  const[bulkMode,setBulkMode]=useState(false);const[bulkName,setBulkName]=useState(staff[0]?.name||"");const[bulkDows,setBulkDows]=useState([1,2,3,4,5]);
  const applyBulk=()=>{const next={...shifts};for(let d=1;d<=dim;d++){const ds=`${viewYM}-${String(d).padStart(2,"0")}`;const dow=new Date(y,mo-1,d).getDay();if(bulkDows.includes(dow)){const cur=next[ds]||[];if(!cur.find(s=>s.name===bulkName)){const type=staff.find(s=>s.name===bulkName)?.type||"正社員";next[ds]=[...cur,{name:bulkName,type,symbol:type==="正社員"?"●":"",start:"09:00",end:"18:00"}];}}}_onSC(next);setBulkMode(false);};

  const canPrev=viewYM>todayYM;const canNext=viewYM<maxYM;

  // CSV取込
  const handleCSVUpload=(e)=>{
    const f=e.target.files?.[0];if(!f)return;
    readFile(f,text=>{
      const rows=parseCSV(text);
      if(rows.length<2){alert("CSVフォーマットが無効です");return;}
      const headerRow=rows[0];const dateOffset={};
      for(let i=1;i<headerRow.length;i++){
        const h=headerRow[i];const m=h.match(/(\d+)\/(\d+)/);
        if(m){const ymd=`${y}-${String(m[1]).padStart(2,"0")}-${String(m[2]).padStart(2,"0")}`;dateOffset[i]=ymd;}
      }
      const next={...shifts};
      for(let ri=1;ri<rows.length;ri++){
        const row=rows[ri];
        if(!row[0]||row[0]==="人員")continue;
        const staffName=row[0];const staffItem=staff.find(s=>s.name===staffName);if(!staffItem)continue;
        for(let ci=1;ci<row.length;ci++){
          const val=row[ci]?.trim()||"";if(!val)continue;const dateStr=dateOffset[ci];if(!dateStr)continue;
          const cur=next[dateStr]||[];if(cur.find(s=>s.name===staffName))continue;
          let start="09:00",end="18:00",symbol="";
          const timeMatch=val.match(/(\d{1,2}):(\d{2})-(\d{1,2}):(\d{2})/);
          if(timeMatch){start=`${String(timeMatch[1]).padStart(2,"0")}:${timeMatch[2]}`;end=`${String(timeMatch[3]).padStart(2,"0")}:${timeMatch[4]}`;}
          if(staffItem.type==="正社員"){symbol=val==="●"||val===""?"●":val;}
          next[dateStr]=[...cur,{name:staffName,type:staffItem.type,symbol,start,end}];
        }
      }
      _onSC(next);alert("シフトCSVを取込みました");
    });
  };

  const calcHeadcount=(dateStr)=>{
    const shfts=getShift(dateStr);
    return shfts.filter(s=>{
      if(s.type==="正社員")return s.symbol==="●";
      return!!(s.start&&s.end);
    }).length;
  };

  const dates=[];for(let d=1;d<=dim;d++)dates.push(`${viewYM}-${String(d).padStart(2,"0")}`);

  return <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <div className="px-4 py-3 border-b border-gray-200 flex items-center justify-between flex-wrap gap-2" style={{background:"#D2B48C"}}>
      <div className="flex items-center gap-2">
        <button onClick={()=>canPrev&&setViewYM(ymOff(viewYM,-1))} className="px-2 py-1 bg-white border border-gray-300 rounded text-sm hover:bg-gray-50" style={{opacity:canPrev?1:.4}}>◀</button>
        <h3 className="text-base font-bold" style={{margin:0}}>{ymLabel(viewYM)}</h3>
        <button onClick={()=>canNext&&setViewYM(ymOff(viewYM,1))} className="px-2 py-1 bg-white border border-gray-300 rounded text-sm hover:bg-gray-50" style={{opacity:canNext?1:.4}}>▶</button>
        {viewYM!==todayYM&&<button onClick={()=>setViewYM(todayYM)} className="px-2 py-1 bg-blue-50 border border-blue-200 rounded text-xs font-semibold text-blue-700">今月</button>}
      </div>
      <div className="flex items-center gap-2">
        <label className="px-3 py-1 rounded-lg text-xs font-semibold border border-blue-300 bg-blue-50 text-blue-700 cursor-pointer hover:bg-blue-100"><span>📥 CSV取込</span><input type="file" accept=".csv,.txt" className="hidden" onChange={handleCSVUpload}/></label>
        <button onClick={()=>setBulkMode(!bulkMode)} className="px-3 py-1 rounded-lg text-xs font-semibold border" style={{background:bulkMode?"#2563eb":"#fff",color:bulkMode?"#fff":"#374151"}}>{bulkMode?"閉じる":"一括設定"}</button>
      </div>
    </div>
    {clipData&&<div className="px-4 py-1 border-b border-green-300 bg-green-50 flex items-center gap-2" style={{fontSize:10}}>
      <span style={{color:"#166534"}}>📋 コピー中: <b>{clipData.symbols.map(s=>s||"空").join(" | ")}</b>（{clipData.symbols.length}日分） — セル選択して ⌘V</span>
    </div>}
    {bulkMode&&<div className="px-4 py-3 border-b border-gray-200 bg-blue-50 flex items-center gap-3 flex-wrap">
      <div><label className="text-xs text-gray-600 block">スタッフ</label><select value={bulkName} onChange={e=>setBulkName(e.target.value)} className="input-s" style={{width:100}}>{staff.map(s=><option key={s.name}>{s.name}</option>)}</select></div>
      <div><label className="text-xs text-gray-600 block">曜日</label><div className="flex gap-1">{WK.map((w,i)=><button key={i} onClick={()=>setBulkDows(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i])} className="w-7 h-7 rounded text-xs font-bold" style={{background:bulkDows.includes(i)?"#2563eb":"#e2e8f0",color:bulkDows.includes(i)?"#fff":"#64748b"}}>{w}</button>)}</div></div>
      <button onClick={applyBulk} className="btn-primary mt-3">適用</button>
    </div>}
    <div className="shift-grid" style={{maxHeight:600,overflowX:"auto",overflowY:"auto",position:"relative"}}>
      <table style={{borderCollapse:"collapse",fontSize:9,minWidth:"100%"}}>
        <thead>
          <tr style={{background:"#D2B48C",position:"sticky",top:0,zIndex:2}}>
            <th className="shift-col-header" style={{position:"sticky",left:0,zIndex:4,width:60,minWidth:60,padding:"4px 2px",textAlign:"center",fontWeight:700,borderRight:"1px solid #999"}}>Staff</th>
            {dates.map(ds=>{const dt=new Date(ds);const dow=dt.getDay();const day=dt.getDate();const isToday=ds===today;const bgc=isToday?"#FFFF99":dow===0?"#E0E0FF":dow===6?"#FFE0E0":"#F5F5F5";return <th key={ds} style={{width:44,minWidth:44,padding:"2px 1px",textAlign:"center",fontWeight:600,fontSize:8,borderRight:"1px solid #999",borderBottom:"1px solid #999",background:bgc,border:isToday?"3px solid #FFD700":"1px solid #999"}}><div>{day}</div><div style={{fontSize:7}}>{WK[dow]}</div></th>;})}
          </tr>
        </thead>
        <tbody>
          {regularStaff.map(staff=><tr key={staff.name}><td className="shift-col" style={{position:"sticky",left:0,zIndex:2,width:60,minWidth:60,padding:"2px 4px",fontWeight:600,fontSize:9,background:"#fff",borderRight:"1px solid #999",borderBottom:"1px solid #d1d5db"}}>{staff.name}</td>{dates.map(ds=>{const shift=getShift(ds).find(s=>s.name===staff.name);const down=new Date(ds).getDay();const bgc=down===0?"#E0E0FF":down===6?"#FFE0E0":"#FFF";let cellBg=bgc;if(shift){if(shift.symbol==="●")cellBg="#D4EBFA";else if(shift.symbol==="希")cellBg="#FFF3CD";else if(shift.symbol==="公")cellBg="#E8E8E8";else if(shift.symbol==="出")cellBg="#D4EDDA";}const isSel=isCellSelected(ds,staff.name);return <td key={ds} onClick={e=>handleCellClick(e,ds,staff.name,"正社員")} style={{width:44,minWidth:44,padding:"1px",textAlign:"center",fontSize:9,fontWeight:600,background:isSel?"#bfdbfe":cellBg,borderRight:"1px solid #d1d5db",borderBottom:"1px solid #d1d5db",cursor:"pointer",outline:isSel?"2px solid #2563eb":"none",outlineOffset:isSel?"-2px":0}}>{shift?shift.symbol:""}</td>;})}</tr>)}
          {partTimeStaff.map(staff=><tr key={staff.name}><td className="shift-col" style={{position:"sticky",left:0,zIndex:2,width:60,minWidth:60,padding:"2px 4px",fontWeight:600,fontSize:9,background:"#fff",borderRight:"1px solid #999",borderBottom:"1px solid #d1d5db"}}>{staff.name}</td>{dates.map(ds=>{const shift=getShift(ds).find(s=>s.name===staff.name);const down=new Date(ds).getDay();const bgc=down===0?"#E0E0FF":down===6?"#FFE0E0":"#FFF";return <td key={ds} style={{width:44,minWidth:44,padding:"1px",textAlign:"center",fontSize:9,background:shift?"#FFF9E6":bgc,borderRight:"1px solid #d1d5db",borderBottom:"1px solid #d1d5db",cursor:"pointer",position:"relative"}}>

/* ==========================================

function FleetTimeline({data,fleet,onFleetChange,today,maintenance,onMaintenanceChange,vehicles,vehicleClasses,onAddReservation,onBulkAddReservation,onCancelReservation,onReassignVehicle,unassignedReasons}){
  const scrollRef=useRef(null);const[tooltip,setTooltip]=useState(null);const[viewMode,setViewMode]=useState("month");const[baseDate,setBaseDate]=useState(today);const[collapsed,setCollapsed]=useState(()=>window.innerWidth<=768?{unassignedAlert:true}:{});const[showMaintForm,setShowMaintForm]=useState(null);const[showResForm,setShowResForm]=useState(null);
  const[dragInfo,setDragInfo]=useState(null);const[dropTarget,setDropTarget]=useState(null);
  const WK=["日","月","火","水","木","金","土"];

  const dates=useMemo(()=>{const dt=new Date(baseDate+"T00:00:00");if(viewMode==="month"){const y=dt.getFullYear(),m=dt.getMonth();const days=new Date(y,m+1,0).getDate();return Array.from({length:days},(_,i)=>toLD(new Date(y,m,i+1)));}else if(viewMode==="week"){const d=new Date(baseDate+"T00:00:00");d.setDate(d.getDate()-d.getDay());return Array.from({length:7},(_,i)=>dOff(toLD(d),i));}else return[baseDate];},[baseDate,viewMode]);

  const[isMobile,setIsMobile]=useState(window.innerWidth<=768);
  useEffect(()=>{const h=()=>setIsMobile(window.innerWidth<=768);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
  const COL_W=viewMode==="month"?(isMobile?60:80):viewMode==="week"?(isMobile?100:140):600;const LEFT_W=isMobile?100:260;const ROW_H=30;const CLASS_H=28;
  const monthLabel=useMemo(()=>{const dt=new Date(baseDate+"T00:00:00");return`${dt.getFullYear()}年${dt.getMonth()+1}月`;},[baseDate]);

  useEffect(()=>{if(scrollRef.current){const ti=dates.indexOf(today);if(ti>=0)scrollRef.current.scrollLeft=Math.max(0,(ti-2)*COL_W);}},[dates,today]);
  const goToday=()=>setBaseDate(today);
  const goPrev=()=>{const dt=new Date(baseDate+"T00:00:00");if(viewMode==="month")dt.setMonth(dt.getMonth()-1);else if(viewMode==="week")dt.setDate(dt.getDate()-7);else dt.setDate(dt.getDate()-1);setBaseDate(toLD(dt));};
  const goNext=()=>{const dt=new Date(baseDate+"T00:00:00");if(viewMode==="month")dt.setMonth(dt.getMonth()+1);else if(viewMode==="week")dt.setDate(dt.getDate()+7);else dt.setDate(dt.getDate()+1);setBaseDate(toLD(dt));};
  const toggleClass=(t)=>setCollapsed(p=>({...p,[t]:!p[t]}));

  const vehicleBars=useMemo(()=>{
    const bars={};vehicles.forEach(v=>{bars[v.code]=[];});
    data.forEach(r=>{const vc=fleet[r.id];if(!vc||!bars[vc])return;const ld=norm(r.lendDate),rd=norm(r.returnDate);const si=dates.indexOf(ld),ei=dates.indexOf(rd);if(si<0&&ei<0)return;const s=Math.max(si,0),e=Math.min(ei>=0?ei:dates.length-1,dates.length-1);bars[vc].push({type:"reservation",r,startI:s,endI:e,left:s*COL_W,width:(e-s+1)*COL_W-2});});
    (maintenance||[]).forEach(m=>{if(!bars[m.vehicleCode])return;const si=dates.indexOf(m.startDate),ei=dates.indexOf(m.endDate);if(si<0&&ei<0)return;const s=Math.max(si,0),e=Math.min(ei>=0?ei:dates.length-1,dates.length-1);bars[m.vehicleCode].push({type:"maintenance",m,startI:s,endI:e,left:s*COL_W,width:(e-s+1)*COL_W-2});});
    return bars;
  },[data,fleet,dates,maintenance,vehicles]);

  // 車両ごとの月別稼働率（表示期間の月の1日〜末日で計算）
  const utilRates=useMemo(()=>{
    const bd=new Date(baseDate+"T00:00:00");const y=bd.getFullYear(),m=bd.getMonth();
    const dim=new Date(y,m+1,0).getDate();
    const rates={};
    vehicles.forEach(v=>{
      // ★ 日単位のSetで重複カウントを防止
      const usedDays=new Set();
      const ms=new Date(y,m,1),me=new Date(y,m,dim);
      // 予約による稼働日
      data.forEach(r=>{if(fleet[r.id]!==v.code)return;
        const ld=new Date(norm(r.lendDate)+"T00:00:00"),rd=new Date(norm(r.returnDate)+"T00:00:00");
        const s=ld>ms?ld:ms;const e=rd<me?rd:me;
        for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){usedDays.add(toLD(d));}
      });
      // メンテナンスによる稼働日
      (maintenance||[]).forEach(mt=>{if(mt.vehicleCode!==v.code)return;
        const ld=new Date(norm(mt.startDate)+"T00:00:00"),rd=new Date(norm(mt.endDate)+"T00:00:00");
        const s=ld>ms?ld:ms;const e=rd<me?rd:me;
        for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){usedDays.add(toLD(d));}
      });
      const days=usedDays.size;
      rates[v.code]={days,total:dim,pct:Math.min(Math.round(days/dim*100),100)};
    });
    return rates;
  },[data,fleet,vehicles,maintenance,baseDate]);

  // セルクリック → アクション選択
  const[cellAction,setCellAction]=useState(null);

  const handleDragStart=(e,resId)=>{e.dataTransfer.setData("text/plain",resId);e.dataTransfer.effectAllowed="move";setDragInfo(resId);};
  const handleDragEnd=()=>{setDragInfo(null);setDropTarget(null);};
  const handleDragOver=(e,vehicleCode)=>{
    if(!dragInfo)return;e.preventDefault();e.dataTransfer.dropEffect="move";
    const res=data.find(r=>r.id===dragInfo);if(!res)return;
    const curVc=fleet[dragInfo];if(curVc===vehicleCode){setDropTarget(null);return;}
    // 日付重複のみチェック（クラス制限なし）
    const conflict=checkVehicleConflict(vehicleCode,dragInfo,data,fleet);

  };
  const handleDrop=(e,vehicleCode)=>{
    e.preventDefault();const resId=e.dataTransfer.getData("text/plain");if(!resId)return;
    setDragInfo(null);setDropTarget(null);

    if(onReassignVehicle)onReassignVehicle(resId,vehicleCode);
    else onFleetChange({...fleet,[resId]:vehicleCode});
  };

  const groups=useMemo(()=>vehicleClasses.map(vc=>({...vc,items:vehicles.filter(v=>v.type===vc.type)})).filter(g=>g.items.length>0),[vehicles,vehicleClasses]);

        <button onClick={goPrev} style={{padding:isMobile?"2px 4px":"4px 8px",background:"#fff",border:"1px solid #d1d5db",borderRadius:4,fontSize:isMobile?10:14,cursor:"pointer"}}>◀</button>

    </div>

    {((unassigned)=>{const ua=data.filter(r=>r.status!=="cancelled"&&!fleet[r.id]&&r.returnDate&&r.returnDate>=today);return ua.length>0?<div style={{borderBottom:"1px solid #fca5a5",background:"#fef2f2",padding:isMobile?"4px 8px":"12px 16px",flexShrink:0,maxHeight:collapsed.unassignedAlert?36:isMobile?120:undefined,overflow:"hidden"}}>

    <div ref={scrollRef} style={{flex:1,overflow:"auto",position:"relative"}}>

              {dates.map(d=><td key={d} style={{height:CLASS_H,borderBottom:"1px solid #e2e8f0",background:"#f8fafc",borderRight:"1px solid #e2e8f0"}}/>)}
            </tr>
            {!collapsed[g.type]&&g.items.map(v=>{const bars=vehicleBars[v.code]||[];const isDT=dropTarget&&dropTarget.vc===v.code;const rowHL=isDT?(dropTarget.ok?"rgba(34,197,94,.15)":"rgba(239,68,68,.1)"):"transparent";return <tr key={v.id} onDragOver={e=>handleDragOver(e,v.code)} onDragLeave={()=>setDropTarget(null)} onDrop={e=>handleDrop(e,v.code)} style={{outline:isDT?(dropTarget.ok?"2px solid #22c55e":"2px dashed #ef4444"):"none"}}>
              <td style={{position:"sticky",left:0,zIndex:5,height:ROW_H,background:isDT?(dropTarget.ok?"#dcfce7":"#fef2f2"):"#fff",borderBottom:"1px solid #f1f5f9",borderRight:"2px solid #94a3b8",padding:isMobile?"0 4px":"0 10px",overflow:"hidden",whiteSpace:"nowrap",transition:"background .15s"}}>
                <span style={{fontSize:isMobile?9:10,fontWeight:700,color:"#2563eb"}}>{v.no}</span>

                {(()=>{const u=utilRates[v.code];if(!u)return null;const pc=u.pct;const cl=pc>=80?"#dc2626":pc>=50?"#f59e0b":"#22c55e";return <span style={{fontSize:8,fontWeight:700,color:cl,marginLeft:4,background:pc>=80?"#fef2f2":pc>=50?"#fffbeb":"#f0fdf4",padding:"0 3px",borderRadius:3}}>{u.days}日{!isMobile&&" "+pc+"%"}</span>;})()}
              </td>
              {dates.map((d,di)=>{const isToday=d===today;return <td key={d} style={{position:"relative",height:ROW_H,borderBottom:"1px solid #f1f5f9",borderRight:"1px solid #e2e8f0",cursor:dragInfo?"copy":"pointer",background:isDT?rowHL:(isToday?"#eff6ff":"transparent"),padding:0,transition:"background .15s"}} onClick={()=>{if(!dragInfo)handleCellClick(v.code,d);}}>
                {di===0&&bars.map((b,bi)=>{const isRes=b.type==="reservation";const isDragging=dragInfo===b.r?.id;return <div key={bi} className="tl-bar" draggable={isRes} onDragStart={isRes?e=>handleDragStart(e,b.r.id):undefined} onDragEnd={handleDragEnd} onClick={e=>handleBarClick(e,b)} style={{left:b.left,width:Math.max(b.width,20),background:isRes?(isDragging?"#f87171":"#dc2626"):"#2563eb",color:"#fff",fontSize:9,fontWeight:600,boxShadow:isDragging?"0 4px 12px rgba(0,0,0,.3)":"0 1px 3px rgba(0,0,0,.2)",position:"absolute",top:3,bottom:3,zIndex:isDragging?10:2,opacity:isDragging?0.7:1,cursor:isRes?"grab":"pointer",transition:"opacity .15s, box-shadow .15s"}}><span style={{overflow:"hidden",textOverflow:"ellipsis"}}>{isRes?`${b.r.lendTime}-${b.r.returnTime} ${b.r.name} 様`:(b.m.label)}</span></div>;})}
              </td>;})}
            </tr>;})}
          </React.Fragment>)}
        </tbody>
      </table>
    </div>

    {cellAction&&<div className="modal-overlay" onClick={()=>setCellAction(null)}><div className="modal-box" style={{maxWidth:280,padding:20}} onClick={e=>e.stopPropagation()}>
      <h4 className="font-bold text-sm mb-3">{cellAction.vehicleCode} — {fmtD(cellAction.date)}</h4>
      <div className="space-y-2">
        <button onClick={()=>{const v=vehicles.find(x=>x.code===cellAction.vehicleCode);setShowResForm({vehicleCode:cellAction.vehicleCode,lendDate:cellAction.date,vehicle:v?.type||"A"});setCellAction(null);}} className="w-full py-2 bg-green-600 text-white rounded-lg text-sm font-bold hover:bg-green-700">新規予約を登録</button>
        <button onClick={()=>{setShowMaintForm(cellAction);setCellAction(null);}} className="w-full py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700">メンテナンス登録</button>
        <button onClick={()=>setCellAction(null)} className="w-full py-2 bg-gray-100 text-gray-600 rounded-lg text-sm font-semibold">キャンセル</button>
      </div>
    </div></div>}

    {tooltip&&<div className="modal-overlay" style={{background:"rgba(0,0,0,.15)"}} onClick={()=>setTooltip(null)}><div className="modal-box" style={{maxWidth:340,padding:20}} onClick={e=>e.stopPropagation()}>
      <div className="flex items-center justify-between mb-2"><span className="font-bold text-sm">{tooltip.type==="reservation"?tooltip.name:tooltip.label}</span><button onClick={()=>setTooltip(null)} className="text-gray-400 hover:text-gray-600">✕</button></div>
      {tooltip.type==="reservation"?<div className="text-xs space-y-1 text-gray-600">
        <div><OBadge ota={tooltip.ota}/> <span className="font-mono">{tooltip.id}</span></div>
        <div>貸出: {fmtD(tooltip.lendDate)} {tooltip.lendTime} / 返却: {fmtD(tooltip.returnDate)} {tooltip.returnTime}</div>
        <div>クラス: {tooltip.vehicle} / 補償: {tooltip.insurance}</div>
        <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4}}>
          <span style={{fontWeight:700,color:"#1e293b"}}>配車:</span>
          <select value={tooltip.vc||""} onChange={e=>{const newVc=e.target.value;if(!newVc){if(!window.confirm("配車を解除しますか？"))return;const nf={...fleet};delete nf[tooltip.id];onFleetChange(nf);setTooltip({...tooltip,vc:""});return;}const conflict=checkVehicleConflict(newVc,tooltip.id,data,fleet);if(conflict){const cv=vehicles.find(x=>x.code===newVc);alert((cv?cv.name:newVc)+" は "+fmtD(conflict.lendDate)+"〜"+fmtD(conflict.returnDate)+" に「"+conflict.name+"」様の予約が入っているため変更できません。");return;}const targetV=vehicles.find(x=>x.code===newVc);if(!window.confirm("配車を「"+(targetV?targetV.name:newVc)+"」に変更しますか？"))return;if(onReassignVehicle){onReassignVehicle(tooltip.id,newVc);}else{onFleetChange({...fleet,[tooltip.id]:newVc});}setTooltip({...tooltip,vc:newVc});}} style={{border:"1px solid #d1d5db",borderRadius:6,padding:"3px 6px",fontSize:11,fontWeight:600,color:"#1d4ed8",flex:1}}>
            <option value="">— 未割当 —</option>
            {vehicleClasses.map(cls=><optgroup key={cls.type} label={cls.type+"クラス"}>{vehicles.filter(v=>v.type===cls.type).map(v=><option key={v.code} value={v.code}>{v.name} ({v.no})</option>)}</optgroup>)}
          </select>
        </div>
        <div className="flex gap-2 mt-3">
          <button onClick={()=>{if(window.confirm(`${tooltip.name} 様の予約をキャンセルしますか？\n\n予約番号: ${tooltip.id}\n貸出: ${fmtD(tooltip.lendDate)} ${tooltip.lendTime}\n返却: ${fmtD(tooltip.returnDate)} ${tooltip.returnTime}\n\nこの操作は取り消せません。`)){onCancelReservation(tooltip.id);setTooltip(null);}}} className="flex-1 py-1.5 bg-red-50 text-red-600 rounded-lg text-xs font-bold hover:bg-red-100 border border-red-200">予約キャンセル</button>
        </div>
      </div>:<div className="text-xs space-y-1 text-gray-600">
        <div>車両: {tooltip.vehicleCode}</div><div>期間: {fmtD(tooltip.startDate)} 〜 {fmtD(tooltip.endDate)}</div>
        <button onClick={()=>removeMaint(tooltip.id)} className="mt-2 w-full py-1.5 bg-red-50 text-red-600 rounded-lg text-xs font-bold hover:bg-red-100">メンテナンスを削除</button>
      </div>}

    {showMaintForm&&<div className="modal-overlay" onClick={()=>setShowMaintForm(null)}><div className="modal-box" style={{maxWidth:320,padding:20}} onClick={e=>e.stopPropagation()}><h4 className="font-bold text-sm mb-3">メンテナンス登録</h4><MaintForm vehicleCode={showMaintForm.vehicleCode} startDate={showMaintForm.date} onAdd={addMaint} onClose={()=>setShowMaintForm(null)} vehicles={vehicles}/></div></div>}

    {showResForm&&<ReservationForm prefill={showResForm} onAdd={(r,vc)=>{onAddReservation(r,vc);setShowResForm(null);}} onBulkAdd={(rArr,fl)=>{onBulkAddReservation(rArr,fl);setShowResForm(null);}} vehicles={vehicles} vehicleClasses={vehicleClasses} onClose={()=>setShowResForm(null)}/>}
  </div>;

function MaintForm({vehicleCode,startDate,onAdd,onClose,vehicles}){
  const[start,setStart]=useState(startDate);const[end,setEnd]=useState(startDate);const[label,setLabel]=useState("メンテナンス");const v=vehicles.find(x=>x.code===vehicleCode);

}

/* ==========================================
   OPシート（独立フルスクリーン）
   ========================================== */
function OPScreen({reservations,today,shifts,fleet,onFleetChange,onClose,vehicles,staff,resOpts,sheetPlaces,onUpdateSheetPlaces}){
  const[dayOff,setDayOff]=useState(0);const selDate=dOff(today,dayOff);const[tasks,setTasks]=useState([]);
  const activeMembers=useMemo(()=>(shifts[selDate]||[]).filter(s=>s.type==="アルバイト"||s.symbol==="●").map(s=>s.name),[shifts,selDate]);
  const fleetRef=React.useRef(fleet);fleetRef.current=fleet;
  // fleet変更時にタスクの車種情報を同期
  useEffect(()=>{
    setTasks(prev=>{
      let changed=false;
      const next=prev.map(t=>{
        if(!t.reservationId)return t;
        const vc=fleet[t.reservationId];
        if(!vc&&!t.assignedVehicle)return t;
        if(vc===t.assignedVehicle)return t;
        changed=true;
        if(!vc)return{...t,assignedVehicle:"",plateNo:"",vehicle:t.vehicle};
        const vn=vehicles.find(v=>v.code===vc);
        return{...t,assignedVehicle:vc,plateNo:vn?vn.no:"",vehicle:vn?vn.type:t.vehicle};
      });
      return changed?next:prev;
    });

              })()}</td>
              <td style={{...cellS(10),fontFamily:"monospace",fontSize:9,fontWeight:700,color:t.plateNo?"#2563eb":"#ccc"}}>{t.plateNo||"-"}</td>

              <td style={{...cellS(16),fontWeight:600,color:t.insurance==="NOC"?"#b45309":"#64748b",fontSize:9}}>{t.manual?<input value={t.insurance||""} onChange={e=>upd(t._id,{...t,insurance:e.target.value})} style={{border:"none",background:"transparent",fontSize:9,width:"100%",padding:0}} placeholder="-"/>:(t.insurance||"")}</td>

              {["yakkan","line","payment"].map((k,ki)=><td key={k} style={cellS(19+ki,k)}>{isLend?<input type="checkbox" checked={t[k]||false} onChange={e=>upd(t._id,mark({...t,[k]:e.target.checked},k))} style={{width:11,height:11}}/>:""}</td>)}
              <td style={cellS(22)}>{t.manual?<input value={t.returnDate||""} onChange={e=>upd(t._id,{...t,returnDate:e.target.value})} style={{border:"none",background:"transparent",fontSize:9,width:"100%",padding:0}} placeholder="-"/>:(isLend?fmtD(t.returnDate):"")}</td><td style={cellS(23)}>{t.manual?<input value={t.returnTime||""} onChange={e=>upd(t._id,{...t,returnTime:e.target.value})} style={{border:"none",background:"transparent",fontSize:9,width:"100%",padding:0}} placeholder="-"/>:(isLend?t.returnTime||"":"")}</td><td style={cellS(24)}>{isLend?t.returnType||"":""}</td><td style={cellS(25,"colPlace")}><EditablePlace value={t.colPlace} field="colPlace" task={t} mark={mark} updFn={upd}/></td><td style={cellS(26)}>{t.flight||""}</td>
              <td style={cellS(27)}>{t.ota?<OBadge ota={t.ota}/>:""}</td><td style={{...cellS(28),fontFamily:"monospace",fontSize:8}}>{t.reservationId||""}</td><td style={cellS(29)}>{t.manual?<input value={t.tel||""} onChange={e=>upd(t._id,{...t,tel:e.target.value})} style={{border:"none",background:"transparent",fontSize:9,width:"100%",padding:0}} placeholder="-"/>:(t.tel||"")}</td><td style={{...cellS(30),fontSize:8}}>{t.manual?<input value={t.mail||""} onChange={e=>upd(t._id,{...t,mail:e.target.value})} style={{border:"none",background:"transparent",fontSize:9,width:"100%",padding:0}} placeholder="-"/>:(t.mail||"")}</td>

function AddTaskForm({onAdd,onClose,activeMembers,vehicles}){

  const classes=[...new Set(vehicles.map(v=>v.type))];
  const submit=()=>{if(!type)return;const v=vehicles.find(x=>x.code===vehicle);onAdd({_id:uid(),type,time,name:customerName||name,assignee,vehicle:v?v.type:"",place,people:0,insurance:"",done:false,memo,reservationId:"",ota:"",assignedVehicle:vehicle,plateNo:v?v.no:"",manual:true});onClose();};

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><div><label className="text-xs text-gray-500">予約者名</label><input value={customerName} onChange={e=>setCustomerName(e.target.value)} className="input-s" placeholder="お客様名"/></div><div><label className="text-xs text-gray-500">担当</label><select value={assignee} onChange={e=>setAssignee(e.target.value)} className="input-s"><option value="">未定</option>{activeMembers.map(m=><option key={m}>{m}</option>)}</select></div></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><div><label className="text-xs text-gray-500">車両</label><select value={vehicle} onChange={e=>setVehicle(e.target.value)} className="input-s"><option value="">—</option>{classes.map(cls=><optgroup key={cls} label={cls+"クラス"}>{vehicles.filter(v=>v.type===cls).map(v=><option key={v.id} value={v.code}>{v.name}({v.no})</option>)}</optgroup>)}</select></div><div><label className="text-xs text-gray-500">場所</label><input value={place} onChange={e=>setPlace(e.target.value)} className="input-s" placeholder="新千歳空港 etc."/></div></div>

function Dashboard({data,fleet,vehicles}){
  // 月選択
  const allMonths=useMemo(()=>{
    const ms=new Set();
    data.forEach(r=>{if(r.lendDate)ms.add(toYM(r.lendDate));if(r.returnDate)ms.add(toYM(r.returnDate));});
    return[...ms].sort();
  },[data]);
  const curYM=toYM(new Date());
  const[selYM,setSelYM]=useState(curYM);
  const prevYM=ymOff(selYM,-1);

  // 対象月のデータ抽出（返却日が選択月に含まれる予約＝売上計上基準）
  const monthData=useMemo(()=>data.filter(r=>r.returnDate&&toYM(r.returnDate)===selYM),[data,selYM]);
  const prevMonthData=useMemo(()=>data.filter(r=>r.returnDate&&toYM(r.returnDate)===prevYM),[data,prevYM]);

  // === KPI計算 ===
  // 売上
  const totalRevenue=useMemo(()=>monthData.reduce((s,r)=>s+(Number(r.price)||0),0),[monthData]);
  const prevRevenue=useMemo(()=>prevMonthData.reduce((s,r)=>s+(Number(r.price)||0),0),[prevMonthData]);
  const revDiff=prevRevenue>0?((totalRevenue-prevRevenue)/prevRevenue*100):0;

  // 予約件数
  const totalCount=monthData.length;
  const prevCount=prevMonthData.length;

  // 平均単価
  const avgPrice=totalCount>0?Math.round(totalRevenue/totalCount):0;
  const prevAvgPrice=prevCount>0?Math.round(prevRevenue/prevCount):0;

  // OTA別売上
  const otaStats=useMemo(()=>{
    const m={};
    monthData.forEach(r=>{const k=r.ota||"?";if(!m[k])m[k]={count:0,revenue:0};m[k].count++;m[k].revenue+=(Number(r.price)||0);});
    return Object.entries(m).sort((a,b)=>b[1].revenue-a[1].revenue);
  },[monthData]);

  // 車両別売上（fleet配車コードで集計）
  const vehStats=useMemo(()=>{
    const m={};
    monthData.forEach(r=>{
      const vc=fleet[r.id]||"未配車";
      if(!m[vc])m[vc]={count:0,revenue:0,days:0};
      m[vc].count++;m[vc].revenue+=(Number(r.price)||0);
      // レンタル日数計算
      if(r.lendDate&&r.returnDate){
        const ld=new Date(r.lendDate+"T00:00:00"),rd=new Date(r.returnDate+"T00:00:00");
        const diff=Math.max(1,Math.ceil((rd-ld)/(1000*60*60*24)));
        m[vc].days+=diff;
      }
    });
    return Object.entries(m).sort((a,b)=>b[1].revenue-a[1].revenue);
  },[monthData,fleet]);

  // 稼働率（月内の各車両の稼働日数 / 月の日数）
  const daysInMo=daysInMonth(selYM);
  const activeVehicles=vehicles.length||8;
  const totalVehDays=activeVehicles*daysInMo; // 全車両×月日数
  const usedDays=useMemo(()=>{
    let total=0;
    // 各予約の配車車両の稼働日数を集計（重複は車両別にSetで管理）
    const vehDayMap={};
    data.forEach(r=>{
      if(!r.lendDate||!r.returnDate)return;
      const vc=fleet[r.id];if(!vc)return;
      const ld=new Date(r.lendDate+"T00:00:00"),rd=new Date(r.returnDate+"T00:00:00");
      if(!vehDayMap[vc])vehDayMap[vc]=new Set();
      for(let d=new Date(ld);d<=rd;d.setDate(d.getDate()+1)){
        const ds=toLD(d);
        if(toYM(ds)===selYM)vehDayMap[vc].add(ds);
      }
    });
    Object.values(vehDayMap).forEach(s=>total+=s.size);
    return total;
  },[data,fleet,selYM]);
  const utilRate=totalVehDays>0?Math.round(usedDays/totalVehDays*100):0;
  // 前月稼働率
  const prevDaysInMo=daysInMonth(prevYM);
  const prevTotalVehDays=activeVehicles*prevDaysInMo;
  const prevUsedDays=useMemo(()=>{
    let total=0;const vehDayMap={};
    data.forEach(r=>{
      if(!r.lendDate||!r.returnDate)return;
      const vc=fleet[r.id];if(!vc)return;
      const ld=new Date(r.lendDate+"T00:00:00"),rd=new Date(r.returnDate+"T00:00:00");
      if(!vehDayMap[vc])vehDayMap[vc]=new Set();
      for(let d=new Date(ld);d<=rd;d.setDate(d.getDate()+1)){
        const ds=toLD(d);
        if(toYM(ds)===prevYM)vehDayMap[vc].add(ds);
      }
    });
    Object.values(vehDayMap).forEach(s=>total+=s.size);
    return total;
  },[data,fleet,prevYM]);
  const prevUtilRate=prevTotalVehDays>0?Math.round(prevUsedDays/prevTotalVehDays*100):0;

  // 日別売上（棒グラフ用）
  const dailyRevenue=useMemo(()=>{
    const m={};
    for(let d=1;d<=daysInMo;d++){
      const ds=selYM+"-"+String(d).padStart(2,"0");
      m[ds]=0;
    }
    monthData.forEach(r=>{
      if(!r.returnDate||!r.price)return;
      const ds=r.returnDate;if(m[ds]!==undefined)m[ds]+=(Number(r.price)||0);
    });
    return Object.entries(m).map(([d,v])=>({day:parseInt(d.split("-")[2]),value:v}));
  },[monthData,selYM,daysInMo]);
  const maxDaily=Math.max(1,...dailyRevenue.map(d=>d.value));

  // 月次推移データ（データが存在する全月を表示）
  const monthlyTrend=useMemo(()=>{
    const dataMonths=new Set();
    data.forEach(r=>{if(r.returnDate)dataMonths.add(toYM(r.returnDate));});
    dataMonths.add(curYM);
    const sorted=[...dataMonths].sort();
    const firstYM=sorted[0],lastYM=sorted[sorted.length-1];
    const months=[];let ym=firstYM;
    for(let i=0;i<36&&ym<=lastYM;i++){months.push(ym);ym=ymOff(ym,1);}
    return months.map(ym=>{
      const md=data.filter(r=>r.returnDate&&toYM(r.returnDate)===ym);
      return{ym,label:(parseInt(ym.split("-")[1]))+"月",revenue:md.reduce((s,r)=>s+(Number(r.price)||0),0),count:md.length};
    });
  },[data,curYM]);
  const maxMonthlyRev=Math.max(1,...monthlyTrend.map(m=>m.revenue));

  // 車種別稼働率
  const vehUtilDetail=useMemo(()=>{
    const vehDayMap={};
    data.forEach(r=>{
      if(!r.lendDate||!r.returnDate)return;
      const vc=fleet[r.id];if(!vc)return;
      if(!vehDayMap[vc])vehDayMap[vc]=new Set();
      const ld=new Date(r.lendDate+"T00:00:00"),rd=new Date(r.returnDate+"T00:00:00");
      for(let d=new Date(ld);d<=rd;d.setDate(d.getDate()+1)){
        const ds=toLD(d);if(toYM(ds)===selYM)vehDayMap[vc].add(ds);
      }
    });
    return vehicles.map(v=>{
      const days=(vehDayMap[v.code]||new Set()).size;
      return{code:v.code,name:v.name,no:v.no,days,rate:Math.round(days/daysInMo*100)};
    }).sort((a,b)=>b.rate-a.rate);
  },[data,fleet,vehicles,selYM,daysInMo]);

  // フォーマットヘルパー
  const fmtY=n=>{if(n>=10000)return(n/10000).toFixed(n>=100000?0:1)+"万";return n.toLocaleString();};
  const diffBadge=(cur,prev,unit="%")=>{
    const d=cur-prev;
    if(d===0)return <span style={{fontSize:9,color:"#94a3b8"}}>±0{unit}</span>;
    return <span style={{fontSize:9,fontWeight:700,color:d>0?"#059669":"#dc2626"}}>{d>0?"▲":"▼"}{Math.abs(d).toFixed(unit==="%"?1:0)}{unit}</span>;
  };
  const cardS={background:"#fff",borderRadius:14,padding:14,border:"1px solid #e2e8f0",marginBottom:10,boxShadow:"0 1px 3px rgba(0,0,0,.05)"};
  const OTA_C={S:"#0ea5e9",J:"#ec4899",R:"#ef4444",A:"#22c55e",O:"#6366f1",RC:"#f97316"};

  return <div style={{maxWidth:640,margin:"0 auto"}}>
    {/* 月選択 */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>

          {(()=>{
            const otaMap={};
            monthData.forEach(r=>{const k=r.ota||"?";if(!otaMap[k])otaMap[k]={count:0,revenue:0,zero:0};otaMap[k].count++;otaMap[k].revenue+=(Number(r.price)||0);if(!r.price)otaMap[k].zero++;});
            return Object.entries(otaMap).sort((a,b)=>b[1].revenue-a[1].revenue).map(([k,v])=>
              <div key={k} style={{fontWeight:600}}>{k}: {v.count}件 / ¥{v.revenue.toLocaleString()}{v.zero>0?` (⚠️ price=0が${v.zero}件)`:""}</div>
            );
          })()}

          <div style={{marginTop:8,fontWeight:700}}>--- price型チェック ---</div>
          {(()=>{const types={};monthData.forEach(r=>{const t=typeof r.price;types[t]=(types[t]||0)+1;});return <div>{Object.entries(types).map(([t,c])=><span key={t} style={{marginRight:8,color:t==="number"?"#059669":"#dc2626",fontWeight:700}}>{t}:{c}件</span>)}</div>;})()}

          <div style={{marginTop:8,fontWeight:700}}>--- price=0 の予約 ---</div>
          {monthData.filter(r=>!r.price).length===0?<div style={{color:"#059669"}}>なし ✅</div>
            :<div>{monthData.filter(r=>!r.price).map((r,i)=><div key={i} style={{color:"#dc2626",fontSize:10}}>ID:{r.id} / {r.name} / OTA:{r.ota} / 返却:{r.returnDate} / price:{JSON.stringify(r.price)}</div>)}</div>}

          <div style={{marginTop:8,fontWeight:700}}>--- 全予約一覧（{ymLabel(selYM)}返却分）---</div>
          <div style={{maxHeight:300,overflow:"auto",fontSize:9}}>
            {monthData.sort((a,b)=>{const oa=(a.ota||"").localeCompare(b.ota||"");if(oa!==0)return oa;return(Number(b.price)||0)-(Number(a.price)||0);}).map((r,i)=>
              <div key={i} style={{color:!r.price?"#dc2626":"inherit"}}>{r.ota}/{r.id}/{r.name}: ¥{(Number(r.price)||0).toLocaleString()} (返却:{r.returnDate}){!r.price&&" ⚠️ZERO"}</div>
            )}
          </div>
        </div>}
      </div>;
    })()}
  </div>;
}

const PARKING_DEFAULT_CARS = [
