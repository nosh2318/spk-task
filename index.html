/* ===== 認証コンポーネント ===== */
function LoginScreen({onLogin}){
  const[pw,setPw]=useState("");const[err,setErr]=useState("");const[loading,setLoading]=useState(false);

        <p style={{fontSize:12,color:"#64748b",margin:"4px 0 0"}}>チーム共有ワークスペース</p>

        <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://xxxxx.supabase.co" style={{width:"100%",padding:"10px 14px",border:"1.5px solid #d1d5db",borderRadius:10,fontSize:13,marginBottom:8,boxSizing:"border-box"}}/>
        <input value={key} onChange={e=>setKey(e.target.value)} placeholder="eyJhbGciOiJIUzI1NiIs..." style={{width:"100%",padding:"10px 14px",border:"1.5px solid #d1d5db",borderRadius:10,fontSize:13,marginBottom:8,boxSizing:"border-box"}}/>

        <p style={{fontSize:10,color:"#94a3b8",marginTop:8,textAlign:"center"}}>設定はこのブラウザに保存されます</p>

/* ===== CSV/TSV Parser ===== */
function parseCSV(text){const lines=[];let cur="",inQ=false;for(let i=0;i<text.length;i++){const c=text[i];if(c==='"')inQ=!inQ;else if((c==="\n"||c==="\r")&&!inQ){if(cur.trim())lines.push(cur);cur="";if(c==="\r"&&text[i+1]==="\n")i++;}else cur+=c;}if(cur.trim())lines.push(cur);if(!lines.length)return[];const firstLine=lines[0];const tabs=firstLine.split("\t").length;const commas=firstLine.split(",").length;const sep=tabs>commas?"\t":",";return lines.map(l=>{const cells=[];let cell="",q=false;for(let i=0;i<l.length;i++){const c=l[i];if(c==='"')q=!q;else if(c===sep&&!q){cells.push(cell.trim());cell="";}else cell+=c;}cells.push(cell.trim());return cells;});}
function readFile(file,cb){const r=new FileReader();r.onload=e=>{const a=new Uint8Array(e.target.result);let t;if(typeof Encoding!=="undefined"){const d=Encoding.detect(a);const u=Encoding.convert(a,{to:"UNICODE",from:d||"AUTO"});t=Encoding.codeToString(u);}else{t=new TextDecoder("utf-8").decode(a);if(!t.includes("事業者")&&!t.includes("予約")&&!t.includes("貸出"))try{t=new TextDecoder("shift_jis").decode(a);}catch(e){}}cb(t);};r.readAsArrayBuffer(file);}

function fmtD(d){if(!d)return"";const dt=new Date(d);if(isNaN(dt))return d;const w=["日","月","火","水","木","金","土"];return`${dt.getMonth()+1}/${dt.getDate()}(${w[dt.getDay()]})`;}
function fmtFull(d){if(!d)return"";const dt=new Date(d);if(isNaN(dt))return d;const w=["日","月","火","水","木","金","土"];return`${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日(${w[dt.getDay()]})`;}
function dOff(b,n){const d=new Date(b);d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];}
function sD(a,b){return(a||"").replace(/\//g,"-")===(b||"").replace(/\//g,"-");}
function norm(d){return(d||"").replace(/\//g,"-");}
// 車両重複チェック: targetVcに対してresIdの期間と1日でもかぶる予約があるか
function checkVehicleConflict(targetVc,resId,data,fleet){
  const res=data.find(r=>r.id===resId);if(!res)return null;
  const ld=norm(res.lendDate),rd=norm(res.returnDate);
  const conflict=data.find(r=>r.id!==resId&&r.status!=="cancelled"&&fleet[r.id]===targetVc&&norm(r.lendDate)<=rd&&norm(r.returnDate)>=ld);
  return conflict||null;
}

/* ===== タスク生成 ===== */
function generateTasks(reservations,date,fleet,vehicles){
  const tasks=[];
  const tomorrow=dOff(date,1);
  // 翌日出発車両を収集（洗車タスク用）
  const tomorrowDELVehicles=new Set();
  reservations.forEach(r=>{
    if(sD(r.lendDate,tomorrow)&&fleet[r.id]){tomorrowDELVehicles.add(fleet[r.id]);}
  });
  reservations.forEach(r=>{
    const fv=fleet[r.id];const veh=fv?vehicles.find(v=>v.code===fv):null;
    const base={reservationId:r.id,ota:r.ota,tel:r.tel||"",mail:r.mail||"",done:false,assignee:"",memo:"",assignedVehicle:fv||"",plateNo:veh?veh.no:"",insuranceChange:"",opts:{b:!!r.optB,c:!!r.optC,j:!!r.optJ,usb:!!r.optUSB,parasol:!!r.optParasol},yakkan:false,line:false,payment:false};
    if(sD(r.lendDate,date)){tasks.push({...base,_id:uid(),type:"DEL",time:r.delTime||r.lendTime,name:r.name,people:r.people,place:r.delPlace||"",vehicle:r.vehicle,insurance:r.insurance,flight:r.flight,returnDate:r.returnDate,returnTime:r.returnTime,returnType:"COL",colPlace:r.colPlace||""});}
    if(sD(r.returnDate,date)){const place=r.colPlace||"";tasks.push({...base,_id:uid(),type:"COL",time:r.colTime||r.returnTime,name:r.name,people:r.people,place,vehicle:r.vehicle,insurance:r.insurance,flight:""});}
  });
  // 洗車タスク: 翌日DELの車両（当日返却後 or 事前準備）
  tomorrowDELVehicles.forEach(vc=>{
    const veh=vehicles.find(v=>v.code===vc);
    // 翌日の予約情報を取得
    const tRes=reservations.find(r=>sD(r.lendDate,tomorrow)&&fleet[r.id]===vc);
    if(!veh)return;
    // 重複チェック：同じ車両で既に洗車が生成されてないか
    if(tasks.find(t=>t.type==="洗車"&&t.assignedVehicle===vc))return;
    tasks.push({_id:uid(),type:"洗車",time:"",name:`翌日出発: ${tRes?tRes.name:""}`,people:0,place:"",vehicle:veh.type,insurance:"",flight:"",reservationId:tRes?tRes.id:"",ota:tRes?tRes.ota:"",tel:"",mail:"",done:false,assignee:"",memo:`${fmtD(tomorrow)} DEL ${tRes?tRes.lendTime:""} ${tRes?tRes.name:""}`,assignedVehicle:vc,plateNo:veh.no,insuranceChange:"",opts:{b:!!(tRes&&tRes.optB),c:!!(tRes&&tRes.optC),j:!!(tRes&&tRes.optJ),usb:!!(tRes&&tRes.optUSB),parasol:!!(tRes&&tRes.optParasol)},yakkan:false,line:false,payment:false,returnDate:"",returnTime:"",returnType:"",colPlace:""});
  });
  return tasks.sort((a,b)=>{
    // 洗車は最後にまとめる
    if(a.type==="洗車"&&b.type!=="洗車")return 1;
    if(a.type!=="洗車"&&b.type==="洗車")return -1;
    return(a.time||"").localeCompare(b.time||"");
  });
}

/* ===== 自動配車ロジック ===== */
function autoAssign(reservations,vehicles,existingFleet,maintenance){
  const fleet={...existingFleet};
  const maints=maintenance||[];
  const sorted=[...reservations].sort((a,b)=>norm(a.lendDate).localeCompare(norm(b.lendDate)));
  sorted.forEach(r=>{
    if(fleet[r.id])return; // 既に割当済み
    const cls=r.vehicle; // 予約のクラス
    const rL=norm(r.lendDate),rR=norm(r.returnDate);
    const candidates=vehicles.filter(v=>v.type===cls);
    for(const v of candidates){
      // メンテナンス期間と重複する車両は除外
      const inMaint=maints.some(m=>{
        if(m.vehicleCode!==v.code)return false;
        const mL=norm(m.startDate),mR=norm(m.endDate);
        return rL<=mR&&rR>=mL;
      });
      if(inMaint)continue;
      // この車両がこの期間に空いているかチェック
      const conflict=sorted.some(other=>{
        if(other.id===r.id)return false;
        if(fleet[other.id]!==v.code)return false;
        const oL=norm(other.lendDate),oR=norm(other.returnDate);
        return rL<=oR&&rR>=oL; // 期間重複
      });
      if(!conflict){fleet[r.id]=v.code;break;}
    }
  });
  return fleet;
}

      <p className="text-xs text-gray-500 mb-3">予約番号でお届け場所・回収場所を一括更新 → OPシートにGoogleマップリンク付きで表示されます<br/>CSVフォーマット: 予約番号, お届け場所, 回収場所{dataCount===0&&<span style={{color:"#b45309",fontWeight:600}}><br/>※ Step 1のCSV取込後にマッチングされます（先に読み込みも可能）</span>}</p>

          const f=e.target.files?.[0];if(!f)return;

            const rows=parseCSV(text);if(rows.length<2){setPlaceLogs([{t:"err",m:"CSVが空です"}]);return;}
            // ヘッダー行を自動検出（最初の10行以内で「予約番号」を含む行を探す）
            let hdIdx=-1,hd=null;
            for(let hi=0;hi<Math.min(rows.length,10);hi++){
              if(rows[hi].some(h=>h&&(h.includes("予約番号")||h==="ID"||h==="id"))){hdIdx=hi;hd=rows[hi];break;}
            }
            if(!hd){setPlaceLogs([{t:"err",m:"「予約番号」列が見つかりません"}]);return;}
            const idxId=hd.findIndex(h=>h.includes("予約番号")||h==="ID"||h==="id");
            const idxDel=hd.findIndex(h=>h.includes("届け")||(h.includes("場所")&&!h.includes("回収")&&!h.includes("返却")));
            const idxCol=hd.findIndex(h=>h.includes("回収")||h.includes("返却場所"));
            if(idxId<0){setPlaceLogs([{t:"err",m:"「予約番号」列が見つかりません"}]);return;}
            const places={};let cnt=0;
            for(let i=hdIdx+1;i<rows.length;i++){
              const r=rows[i];const rid=r[idxId]?.trim();if(!rid)continue;
              const del=idxDel>=0?r[idxDel]?.trim()||"":"";
              const col=idxCol>=0?r[idxCol]?.trim()||"":"";
              if(del||col){places[rid]={delPlace:del,colPlace:col};cnt++;}
            }
            if(cnt===0){setPlaceLogs([{t:"err",m:"有効なデータがありません"}]);return;}
            const now2=new Date();const ts2=`${now2.getMonth()+1}/${now2.getDate()} ${String(now2.getHours()).padStart(2,"0")}:${String(now2.getMinutes()).padStart(2,"0")}`;
            onSetPendingPlaces(places);
            if(dataCount>0){const result=onUpdatePlaces(places);setPlaceLogs([{t:"ok",m:`[${ts2}] ${f.name}: ${cnt}件読込 → ${result.matched}件マッチ, ${result.unmatched}件未マッチ`}]);}
            else{setPlaceLogs([{t:"ok",m:`[${ts2}] ${f.name}: ${cnt}件読込済み（Step 1のCSV取込後に自動マッチングされます）`}]);}
          });
        }}/></label>
        <span className="text-xs text-gray-400">予約番号 + お届け場所 + 回収場所</span>
      </div>
      {placeLogs.length>0&&<div className="mt-2">{placeLogs.map((l,i)=><div key={i} className="text-xs px-2 py-1 rounded mb-1" style={{background:l.t==="err"?"#fef2f2":"#f0fdf4",color:l.t==="err"?"#b91c1c":"#15803d"}}>{l.t==="err"?"✗":"✓"} {l.m}</div>)}</div>}
      {pendingPlaces&&Object.keys(pendingPlaces).length>0&&dataCount===0&&<div className="mt-2 px-2 py-1 rounded text-xs" style={{background:"#fef3c7",color:"#92400e"}}>📍 場所データ {Object.keys(pendingPlaces).length}件 読込済み — Step 1のインポート待ち</div>}
    </div>
  </div>;
}

function StaffManager({staff,onStaffChange,onDeleteStaff}){
  const[editId,setEditId]=useState(null);

  const[adding,setAdding]=useState(false);

  const[editOrigName,setEditOrigName]=useState("");
  const save=()=>{
    if(!form.name.trim())return;
    if(adding){
      onStaffChange([...staff,{name:form.name.trim(),type:form.type,memo:form.memo}]);
      setAdding(false);
    }else if(editId!==null){
      const oldName=editOrigName;
      const newName=form.name.trim();
      const updated=[...staff];
      updated[editId]={name:newName,type:form.type,memo:form.memo};
      onStaffChange(updated);
      // 名前が変わった場合、旧レコードをDBから削除
      if(oldName&&oldName!==newName&&onDeleteStaff)onDeleteStaff(oldName);
      setEditId(null);setEditOrigName("");
    }
    setForm({name:"",type:"正社員",memo:""});
  };

  const startEdit=(i)=>{setEditId(i);setEditOrigName(staff[i].name);setForm({...staff[i]});setAdding(false);};
  const startAdd=()=>{setForm({name:"",type:"正社員",memo:""});setAdding(true);setEditId(null);};
  const remove=(i)=>{if(window.confirm(`${staff[i].name} を削除しますか？`)){const name=staff[i].name;onStaffChange(staff.filter((_,j)=>j!==i));if(onDeleteStaff)onDeleteStaff(name);}};
  const cancel=()=>{setAdding(false);setEditId(null);setForm({name:"",type:"正社員",memo:""});};

  const sorted=[...staff.map((s,i)=>({...s,_i:i}))].sort((a,b)=>{
    if(a.type==="正社員"&&b.type!=="正社員")return -1;
    if(a.type!=="正社員"&&b.type==="正社員")return 1;
    return 0;
  });

  const regularCount=staff.filter(s=>s.type==="正社員").length;
  const partCount=staff.filter(s=>s.type==="アルバイト").length;

  return <div style={{maxWidth:640,margin:"0 auto"}}>
    <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div className="px-4 py-3 border-b border-gray-200 flex items-center justify-between" style={{background:"#f8fafc"}}>
        <div>
          <h3 className="text-base font-bold text-gray-800" style={{margin:0}}>スタッフ名簿</h3>
          <div className="text-xs text-gray-500 mt-0.5">正社員 {regularCount}名 / アルバイト {partCount}名</div>
        </div>
        <button onClick={startAdd} className="btn-primary">＋ スタッフ追加</button>
      </div>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
        <thead><tr style={{background:"#f1f5f9"}}>{["区分","名前","メモ","操作"].map(h=><th key={h} style={{padding:"8px 12px",textAlign:"left",fontWeight:600,fontSize:10,color:"#475569",borderBottom:"2px solid #cbd5e1"}}>{h}</th>)}</tr></thead>
        <tbody>
          {adding&&<tr style={{background:"#eff6ff"}}><td style={{padding:"6px 12px",borderBottom:"1px solid #e2e8f0"}}><select value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))} className="input-s" style={{width:90,fontSize:11}}><option>正社員</option><option>アルバイト</option></select></td><td style={{padding:"6px 12px",borderBottom:"1px solid #e2e8f0"}}><input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="名前" className="input-s" style={{width:100,fontSize:11}} autoFocus/></td><td style={{padding:"6px 12px",borderBottom:"1px solid #e2e8f0"}}><input value={form.memo} onChange={e=>setForm(p=>({...p,memo:e.target.value}))} placeholder="メモ" className="input-s" style={{fontSize:11}}/></td><td style={{padding:"6px 12px",borderBottom:"1px solid #e2e8f0"}}><div className="flex gap-1"><button onClick={save} className="px-2 py-1 bg-blue-600 text-white rounded text-xs font-bold">保存</button><button onClick={cancel} className="px-2 py-1 bg-gray-100 text-gray-600 rounded text-xs">取消</button></div></td></tr>}
          {sorted.map(s=>{const isEdit=editId===s._i;const isReg=s.type==="正社員";
            return <tr key={s._i} style={{background:isEdit?"#eff6ff":"transparent"}}>
              <td style={{padding:"6px 12px",borderBottom:"1px solid #e2e8f0"}}>{isEdit?<select value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))} className="input-s" style={{width:90,fontSize:11}}><option>正社員</option><option>アルバイト</option></select>:<span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:4,background:isReg?"#dbeafe":"#fef3c7",color:isReg?"#1d4ed8":"#92400e"}}>{s.type}</span>}</td>
              <td style={{padding:"6px 12px",borderBottom:"1px solid #e2e8f0",fontWeight:600}}>{isEdit?<input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} className="input-s" style={{width:100,fontSize:11}}/>:s.name}</td>
              <td style={{padding:"6px 12px",borderBottom:"1px solid #e2e8f0",color:"#64748b",fontSize:11}}>{isEdit?<input value={form.memo} onChange={e=>setForm(p=>({...p,memo:e.target.value}))} className="input-s" style={{fontSize:11}}/>:(s.memo||"—")}</td>

            </tr>;})}
        </tbody>
      </table>
    </div>
  </div>;
}

/* ==========================================
   出勤簿（月次カレンダー+ CSV取込）
   ========================================== */
function ShiftCalendar({shifts,onShiftsChange,today,staff,sbSaveShift}){
  const todayYM=toYM(today);const[viewYM,setViewYM]=useState(todayYM);const WK=["日","月","火","水","木","金","土"];
  const SYMBOLS=["●","希","公","出",""];
  const maxYM=ymOff(todayYM,3);const dim=daysInMonth(viewYM);const[y,mo]=viewYM.split("-").map(Number);
  const getShift=(date)=>shifts[date]||[];
  const regularStaff=staff.filter(s=>s.type==="正社員");const partTimeStaff=staff.filter(s=>s.type==="アルバイト");
  const[editTime,setEditTime]=useState(null);
  // Supabase同期付きシフト更新
  const updateShifts=(next)=>{onShiftsChange(next);if(sbSaveShift){Object.entries(next).forEach(([date,arr])=>{if(arr!==shifts[date])arr.forEach(s=>sbSaveShift(date,s.name,s));});}};
  const _onSC=updateShifts;

  const handleCellClick=(dateStr,name,type)=>{
    const cur=getShift(dateStr);const idx=cur.findIndex(s=>s.name===name);
    if(idx>=0){
      if(type==="正社員"){
        const shift=cur[idx];const symIdx=SYMBOLS.indexOf(shift.symbol||"");const nextSym=symIdx>=0?SYMBOLS[(symIdx+1)%SYMBOLS.length]:"●";
        const updated=[...cur];updated[idx]={...shift,symbol:nextSym};_onSC({...shifts,[dateStr]:updated});
      }else{
        _onSC({...shifts,[dateStr]:cur.filter(s=>s.name!==name)});
      }
    }else{
      const newShift={name,type,symbol:type==="正社員"?"●":"",start:"09:00",end:"18:00"};_onSC({...shifts,[dateStr]:[...cur,newShift]});
    }
  };

  const handleTimeChange=(dateStr,name,startTime,endTime)=>{
    const cur=getShift(dateStr);const idx=cur.findIndex(s=>s.name===name);
    if(idx>=0){const updated=[...cur];updated[idx]={...cur[idx],start:startTime,end:endTime};_onSC({...shifts,[dateStr]:updated});}
  };

  const[bulkMode,setBulkMode]=useState(false);const[bulkName,setBulkName]=useState(staff[0]?.name||"");const[bulkDows,setBulkDows]=useState([1,2,3,4,5]);
  const applyBulk=()=>{const next={...shifts};for(let d=1;d<=dim;d++){const ds=`${viewYM}-${String(d).padStart(2,"0")}`;const dow=new Date(y,mo-1,d).getDay();if(bulkDows.includes(dow)){const cur=next[ds]||[];if(!cur.find(s=>s.name===bulkName)){const type=staff.find(s=>s.name===bulkName)?.type||"正社員";next[ds]=[...cur,{name:bulkName,type,symbol:type==="正社員"?"●":"",start:"09:00",end:"18:00"}];}}}_onSC(next);setBulkMode(false);};

  const canPrev=viewYM>todayYM;const canNext=viewYM<maxYM;

  // CSV取込
  const handleCSVUpload=(e)=>{
    const f=e.target.files?.[0];if(!f)return;
    readFile(f,text=>{
      const rows=parseCSV(text);
      if(rows.length<2){alert("CSVフォーマットが無効です");return;}
      const headerRow=rows[0];const dateOffset={};
      for(let i=1;i<headerRow.length;i++){
        const h=headerRow[i];const m=h.match(/(\d+)\/(\d+)/);
        if(m){const ymd=`${y}-${String(m[1]).padStart(2,"0")}-${String(m[2]).padStart(2,"0")}`;dateOffset[i]=ymd;}
      }
      const next={...shifts};
      for(let ri=1;ri<rows.length;ri++){
        const row=rows[ri];
        if(!row[0]||row[0]==="人員")continue;
        const staffName=row[0];const staffItem=staff.find(s=>s.name===staffName);if(!staffItem)continue;
        for(let ci=1;ci<row.length;ci++){
          const val=row[ci]?.trim()||"";if(!val)continue;const dateStr=dateOffset[ci];if(!dateStr)continue;
          const cur=next[dateStr]||[];if(cur.find(s=>s.name===staffName))continue;
          let start="09:00",end="18:00",symbol="";
          const timeMatch=val.match(/(\d{1,2}):(\d{2})-(\d{1,2}):(\d{2})/);
          if(timeMatch){start=`${String(timeMatch[1]).padStart(2,"0")}:${timeMatch[2]}`;end=`${String(timeMatch[3]).padStart(2,"0")}:${timeMatch[4]}`;}
          if(staffItem.type==="正社員"){symbol=val==="●"||val===""?"●":val;}
          next[dateStr]=[...cur,{name:staffName,type:staffItem.type,symbol,start,end}];
        }
      }
      _onSC(next);alert("シフトCSVを取込みました");
    });
  };

  const calcHeadcount=(dateStr)=>{
    const shfts=getShift(dateStr);
    return shfts.filter(s=>{
      if(s.type==="正社員")return s.symbol==="●";
      return!!(s.start&&s.end);
    }).length;
  };

  const dates=[];for(let d=1;d<=dim;d++)dates.push(`${viewYM}-${String(d).padStart(2,"0")}`);

  return <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <div className="px-4 py-3 border-b border-gray-200 flex items-center justify-between flex-wrap gap-2" style={{background:"#D2B48C"}}>
      <div className="flex items-center gap-2">
        <button onClick={()=>canPrev&&setViewYM(ymOff(viewYM,-1))} className="px-2 py-1 bg-white border border-gray-300 rounded text-sm hover:bg-gray-50" style={{opacity:canPrev?1:.4}}>◀</button>
        <h3 className="text-base font-bold" style={{margin:0}}>{ymLabel(viewYM)}</h3>
        <button onClick={()=>canNext&&setViewYM(ymOff(viewYM,1))} className="px-2 py-1 bg-white border border-gray-300 rounded text-sm hover:bg-gray-50" style={{opacity:canNext?1:.4}}>▶</button>
        {viewYM!==todayYM&&<button onClick={()=>setViewYM(todayYM)} className="px-2 py-1 bg-blue-50 border border-blue-200 rounded text-xs font-semibold text-blue-700">今月</button>}
      </div>
      <div className="flex items-center gap-2">
        <label className="px-3 py-1 rounded-lg text-xs font-semibold border border-blue-300 bg-blue-50 text-blue-700 cursor-pointer hover:bg-blue-100"><span>📥 CSV取込</span><input type="file" accept=".csv,.txt" className="hidden" onChange={handleCSVUpload}/></label>
        <button onClick={()=>setBulkMode(!bulkMode)} className="px-3 py-1 rounded-lg text-xs font-semibold border" style={{background:bulkMode?"#2563eb":"#fff",color:bulkMode?"#fff":"#374151"}}>{bulkMode?"閉じる":"一括設定"}</button>
      </div>
    </div>
    {bulkMode&&<div className="px-4 py-3 border-b border-gray-200 bg-blue-50 flex items-center gap-3 flex-wrap">
      <div><label className="text-xs text-gray-600 block">スタッフ</label><select value={bulkName} onChange={e=>setBulkName(e.target.value)} className="input-s" style={{width:100}}>{staff.map(s=><option key={s.name}>{s.name}</option>)}</select></div>
      <div><label className="text-xs text-gray-600 block">曜日</label><div className="flex gap-1">{WK.map((w,i)=><button key={i} onClick={()=>setBulkDows(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i])} className="w-7 h-7 rounded text-xs font-bold" style={{background:bulkDows.includes(i)?"#2563eb":"#e2e8f0",color:bulkDows.includes(i)?"#fff":"#64748b"}}>{w}</button>)}</div></div>
      <button onClick={applyBulk} className="btn-primary mt-3">適用</button>
    </div>}
    <div className="shift-grid" style={{maxHeight:600,overflowX:"auto",overflowY:"auto",position:"relative"}}>
      <table style={{borderCollapse:"collapse",fontSize:9,minWidth:"100%"}}>
        <thead>
          <tr style={{background:"#D2B48C",position:"sticky",top:0,zIndex:2}}>
            <th className="shift-col-header" style={{position:"sticky",left:0,zIndex:4,width:60,minWidth:60,padding:"4px 2px",textAlign:"center",fontWeight:700,borderRight:"1px solid #999"}}>Staff</th>
            {dates.map(ds=>{const dt=new Date(ds);const dow=dt.getDay();const day=dt.getDate();const isToday=ds===today;const bgc=isToday?"#FFFF99":dow===0?"#E0E0FF":dow===6?"#FFE0E0":"#F5F5F5";return <th key={ds} style={{width:44,minWidth:44,padding:"2px 1px",textAlign:"center",fontWeight:600,fontSize:8,borderRight:"1px solid #999",borderBottom:"1px solid #999",background:bgc,border:isToday?"3px solid #FFD700":"1px solid #999"}}><div>{day}</div><div style={{fontSize:7}}>{WK[dow]}</div></th>;})}
          </tr>
        </thead>
        <tbody>
          {regularStaff.map(staff=><tr key={staff.name}><td className="shift-col" style={{position:"sticky",left:0,zIndex:2,width:60,minWidth:60,padding:"2px 4px",fontWeight:600,fontSize:9,background:"#fff",borderRight:"1px solid #999",borderBottom:"1px solid #d1d5db"}}>{staff.name}</td>{dates.map(ds=>{const shift=getShift(ds).find(s=>s.name===staff.name);const down=new Date(ds).getDay();const bgc=down===0?"#E0E0FF":down===6?"#FFE0E0":"#FFF";let cellBg=bgc;if(shift){if(shift.symbol==="●")cellBg="#D4EBFA";else if(shift.symbol==="希")cellBg="#FFF3CD";else if(shift.symbol==="公")cellBg="#E8E8E8";else if(shift.symbol==="出")cellBg="#D4EDDA";}return <td key={ds} onClick={()=>handleCellClick(ds,staff.name,"正社員")} style={{width:44,minWidth:44,padding:"1px",textAlign:"center",fontSize:9,fontWeight:600,background:cellBg,borderRight:"1px solid #d1d5db",borderBottom:"1px solid #d1d5db",cursor:"pointer"}}>{shift?shift.symbol:""}</td>;})}</tr>)}
          {partTimeStaff.map(staff=><tr key={staff.name}><td className="shift-col" style={{position:"sticky",left:0,zIndex:2,width:60,minWidth:60,padding:"2px 4px",fontWeight:600,fontSize:9,background:"#fff",borderRight:"1px solid #999",borderBottom:"1px solid #d1d5db"}}>{staff.name}</td>{dates.map(ds=>{const shift=getShift(ds).find(s=>s.name===staff.name);const down=new Date(ds).getDay();const bgc=down===0?"#E0E0FF":down===6?"#FFE0E0":"#FFF";return <td key={ds} style={{width:44,minWidth:44,padding:"1px",textAlign:"center",fontSize:9,background:shift?"#FFF9E6":bgc,borderRight:"1px solid #d1d5db",borderBottom:"1px solid #d1d5db",cursor:"pointer",position:"relative"}}>
            {shift?<div style={{display:"inline-block",cursor:"pointer"}} onClick={()=>setEditTime({dateStr:ds,name:staff.name,start:shift.start,end:shift.end})}>{shift.start}-{shift.end}</div>:<button onClick={()=>handleCellClick(ds,staff.name,"アルバイト")} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:"#ccc"}}>+</button>}</td>;})}</tr>)}
          <tr style={{fontWeight:700,background:"#D2B48C"}}>
            <td className="shift-col" style={{position:"sticky",left:0,zIndex:2,width:60,minWidth:60,padding:"2px 4px",fontSize:9,fontWeight:700,background:"#D2B48C",borderRight:"1px solid #999",borderBottom:"1px solid #999"}}>人員</td>
            {dates.map(ds=>{return <td key={ds} style={{width:44,minWidth:44,padding:"2px 1px",textAlign:"center",fontSize:9,fontWeight:700,background:"#D2B48C",borderRight:"1px solid #999",borderBottom:"1px solid #999"}}>{calcHeadcount(ds)}</td>;})}
          </tr>
        </tbody>
      </table>
    </div>
    <div className="px-4 py-2 border-t border-gray-200 bg-gray-50 overflow-x-auto">
      <table style={{fontSize:9,borderCollapse:"collapse",minWidth:"100%"}}>
        <thead><tr style={{background:"#e5e7eb"}}>
          <th style={{padding:"2px 6px",textAlign:"left",fontWeight:700,border:"1px solid #d1d5db"}}>名前</th>
          <th style={{padding:"2px 6px",textAlign:"center",fontWeight:700,border:"1px solid #d1d5db",minWidth:30}}>●出勤</th>
          <th style={{padding:"2px 6px",textAlign:"center",fontWeight:700,border:"1px solid #d1d5db",minWidth:30}}>希希望休</th>
          <th style={{padding:"2px 6px",textAlign:"center",fontWeight:700,border:"1px solid #d1d5db",minWidth:30}}>公公休</th>
          <th style={{padding:"2px 6px",textAlign:"center",fontWeight:700,border:"1px solid #d1d5db",minWidth:30}}>出出張</th>
          <th style={{padding:"2px 6px",textAlign:"center",fontWeight:700,border:"1px solid #d1d5db",minWidth:30}}>合計</th>
        </tr></thead>
        <tbody>
          {staff.map(s=>{
            const staffSymCounts={};let workDays=0;
            dates.forEach(ds=>{
              const dayShifts=getShift(ds);
              const sShift=dayShifts.find(sh=>sh.name===s.name);
              if(!sShift)return;
              if(sShift.symbol){
                staffSymCounts[sShift.symbol]=(staffSymCounts[sShift.symbol]||0)+1;
              }else if(sShift.start&&sShift.end){
                workDays++;
              }
            });
            const symWork=staffSymCounts["●"]||0;
            const totalWork=symWork+workDays;
            const total=totalWork+(staffSymCounts["希"]||0)+(staffSymCounts["公"]||0)+(staffSymCounts["出"]||0);
            const isPartTime=s.type==="アルバイト";
            return <tr key={s.name} style={{background:isPartTime?"#fffbeb":"#fff",borderBottom:"1px solid #d1d5db"}}>
              <td style={{padding:"2px 6px",border:"1px solid #d1d5db",fontWeight:600}}><span style={{fontSize:8,fontWeight:700,padding:"1px 4px",borderRadius:3,background:isPartTime?"#fef3c7":"#dbeafe",color:isPartTime?"#92400e":"#1d4ed8",marginRight:3}}>{isPartTime?"ア":"社"}</span>{s.name}</td>
              <td style={{padding:"2px 6px",border:"1px solid #d1d5db",textAlign:"center",fontWeight:totalWork>0?700:400,color:totalWork>0?"#1d4ed8":"#94a3b8"}}>{totalWork}</td>
              <td style={{padding:"2px 6px",border:"1px solid #d1d5db",textAlign:"center"}}>{staffSymCounts["希"]||0}</td>
              <td style={{padding:"2px 6px",border:"1px solid #d1d5db",textAlign:"center"}}>{staffSymCounts["公"]||0}</td>
              <td style={{padding:"2px 6px",border:"1px solid #d1d5db",textAlign:"center"}}>{staffSymCounts["出"]||0}</td>
              <td style={{padding:"2px 6px",border:"1px solid #d1d5db",textAlign:"center",fontWeight:700}}>{total}</td>
            </tr>;
          })}
        </tbody>
      </table>
    </div>

    {editTime&&<div className="modal-overlay" onClick={()=>setEditTime(null)}><div className="modal-box" style={{maxWidth:280,padding:20}} onClick={e=>e.stopPropagation()}>
      <h4 className="font-bold text-sm mb-3">{editTime.name} — {fmtD(editTime.dateStr)}</h4>
      <div className="space-y-3">
        <div>
          <label className="text-xs text-gray-600 block mb-1">開始時間</label>
          <input type="time" value={editTime.start} onChange={e=>setEditTime({...editTime,start:e.target.value})} className="input-s"/>
        </div>
        <div>
          <label className="text-xs text-gray-600 block mb-1">終了時間</label>
          <input type="time" value={editTime.end} onChange={e=>setEditTime({...editTime,end:e.target.value})} className="input-s"/>
        </div>
        <div className="flex gap-2 pt-2">
          <button onClick={()=>{handleTimeChange(editTime.dateStr,editTime.name,editTime.start,editTime.end);setEditTime(null);}} className="flex-1 py-2 bg-blue-600 text-white rounded text-xs font-bold hover:bg-blue-700">保存</button>
          <button onClick={()=>{const cur=getShift(editTime.dateStr);_onSC({...shifts,[editTime.dateStr]:cur.filter(s=>s.name!==editTime.name)});setEditTime(null);}} className="flex-1 py-2 bg-red-50 text-red-600 rounded text-xs font-bold hover:bg-red-100 border border-red-200">削除</button>
          <button onClick={()=>setEditTime(null)} className="px-3 py-2 bg-gray-100 text-gray-600 rounded text-xs hover:bg-gray-200">キャンセル</button>
        </div>
      </div>
    </div></div>}
  </div>;
}

/* ==========================================
   新規予約登録フォーム（手動 + CSV自動配車）
   ========================================== */
function ReservationForm({onAdd,onBulkAdd,vehicles,vehicleClasses,onClose,prefill}){
  const init=prefill||{name:"",people:1,delPlace:"",colPlace:"",vehicle:"A",vehicleCode:"",insurance:"免責",lendDate:"",returnDate:"",lendTime:"09:00",returnTime:"18:00",id:"M"+Date.now(),ota:"O",flight:""};
  const[f,setF]=useState(init);
  const[mode,setMode]=useState("manual"); // manual / csv
  const[csvResult,setCsvResult]=useState(null);
  const[csvLogs,setCsvLogs]=useState([]);

  const upF=(k,v)=>setF(p=>({...p,[k]:v}));

  // CSV取込（配車は手動）
  const handleCSV=(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    readFile(file,text=>{
      const rows=parseCSV(text);
      const res=detectParse(rows);
      if(!res){setCsvLogs([{t:"err",m:"CSV形式を検出できません"}]);return;}
      const skipMsg=res.skippedOther>0?` (他店舗${res.skippedOther}件除外)`:"";
      setCsvLogs([{t:"ok",m:`${OTA[res.ota].name} 札幌${res.data.length}件${skipMsg}`}]);
      setCsvResult({data:res.data,fleet:{},ota:res.ota});
    });
  };
  const commitCSV=()=>{if(csvResult)onBulkAdd(csvResult.data,csvResult.fleet);};

  const submit=()=>{
    const r={...f,id:f.id||"M"+Date.now(),ota:f.ota||"O",status:"confirmed",visitType:"DEL",returnType:"COL",delTime:f.lendTime,colTime:f.returnTime,delPlace:f.delPlace||"",colPlace:f.colPlace||""};
    onAdd(r,f.vehicleCode);
  };

  return <div className="modal-overlay" onClick={onClose}><div className="modal-box" style={{maxWidth:560,maxHeight:"90vh"}} onClick={e=>e.stopPropagation()}>
    <div style={{padding:"16px 20px",borderBottom:"1px solid #e5e7eb"}}>
      <div className="flex items-center justify-between">
        <h3 className="font-bold text-base">新規予約登録</h3>
        <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-lg">✕</button>
      </div>
      <div className="flex gap-2 mt-2">
        <button onClick={()=>setMode("manual")} className="px-3 py-1 rounded-lg text-xs font-bold" style={{background:mode==="manual"?"#2563eb":"#f1f5f9",color:mode==="manual"?"#fff":"#374151"}}>手動入力</button>
        <button onClick={()=>setMode("csv")} className="px-3 py-1 rounded-lg text-xs font-bold" style={{background:mode==="csv"?"#2563eb":"#f1f5f9",color:mode==="csv"?"#fff":"#374151"}}>CSV一括取込</button>
      </div>
    </div>

    <div style={{padding:"12px 20px",overflowY:"auto",maxHeight:"calc(90vh - 120px)"}}>
      {mode==="csv"?<div>
        <p className="text-xs text-gray-500 mb-2">CSVをアップロードして予約を一括登録します（配車は配車表から手動で行います）</p>
        <label className="flex flex-col items-center p-6 rounded-xl border-2 border-dashed border-blue-300 bg-blue-50 cursor-pointer hover:bg-blue-100 transition mb-3">
          <span style={{fontSize:28}}>📄</span>
          <span className="text-sm font-semibold text-blue-700 mt-1">CSVファイルを選択</span>
          <input type="file" accept=".csv,.txt" className="hidden" onChange={handleCSV}/>
        </label>
        {csvLogs.map((l,i)=><div key={i} className="text-xs px-2 py-1 rounded mb-1" style={{background:l.t==="err"?"#fef2f2":"#f0fdf4",color:l.t==="err"?"#b91c1c":"#15803d"}}>{l.t==="err"?"✗":"✓"} {l.m}</div>)}
        {csvResult&&<div className="mt-3">
          <div className="text-sm font-bold mb-2">配車プレビュー（{csvResult.data.length}件）</div>
          <div style={{maxHeight:300,overflowY:"auto"}} className="border rounded-lg">
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}><thead><tr style={{background:"#f1f5f9"}}>
              <th className="px-2 py-1 text-left border-b">予約者</th><th className="px-2 py-1 text-left border-b">クラス</th><th className="px-2 py-1 text-left border-b">貸出</th><th className="px-2 py-1 text-left border-b">返却</th><th className="px-2 py-1 text-left border-b">状態</th>
            </tr></thead><tbody>
              {csvResult.data.map((r,i)=><tr key={i} className="border-b border-gray-100">
                <td className="px-2 py-1 font-semibold">{r.name}</td>
                <td className="px-2 py-1">{r.vehicle}</td>
                <td className="px-2 py-1">{fmtD(r.lendDate)} {r.lendTime}</td>
                <td className="px-2 py-1">{fmtD(r.returnDate)} {r.returnTime}</td>
                <td className="px-2 py-1"><span style={{color:"#f59e0b",fontWeight:700}}>未配車</span></td>
              </tr>)}
            </tbody></table>
          </div>
          <button onClick={commitCSV} className="btn-primary mt-3 w-full" style={{padding:10}}>この内容で一括登録（配車は配車表で手動）</button>
        </div>}
      </div>:
      <div className="space-y-3">
        <div style={{display:"grid",gridTemplateColumns:"1fr 80px",gap:8}}>
          <div><label className="text-xs text-gray-500">予約者名</label><input value={f.name} onChange={e=>upF("name",e.target.value)} className="input-s" placeholder="タケモト ショウタ"/></div>
          <div><label className="text-xs text-gray-500">人数</label><input type="number" value={f.people} onChange={e=>upF("people",+e.target.value)} className="input-s"/></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div><label className="text-xs text-gray-500">貸出日</label><input type="date" value={f.lendDate} onChange={e=>upF("lendDate",e.target.value)} className="input-s"/></div>
          <div><label className="text-xs text-gray-500">貸出時間</label><input value={f.lendTime} onChange={e=>upF("lendTime",e.target.value)} className="input-s" placeholder="09:00"/></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div><label className="text-xs text-gray-500">返却日</label><input type="date" value={f.returnDate} onChange={e=>upF("returnDate",e.target.value)} className="input-s"/></div>
          <div><label className="text-xs text-gray-500">返却時間</label><input value={f.returnTime} onChange={e=>upF("returnTime",e.target.value)} className="input-s" placeholder="18:00"/></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div><label className="text-xs text-gray-500">予約車種（クラス）</label><select value={f.vehicle} onChange={e=>upF("vehicle",e.target.value)} className="input-s">{vehicleClasses.map(c=><option key={c.type} value={c.type}>{c.type}クラス — {c.label}</option>)}</select></div>
          <div><label className="text-xs text-gray-500">車両（ナンバー）</label><select value={f.vehicleCode} onChange={e=>upF("vehicleCode",e.target.value)} className="input-s"><option value="">未定（配車表で手動）</option>{vehicles.filter(v=>v.type===f.vehicle).map(v=><option key={v.id} value={v.code}>{v.name} ({v.no})</option>)}</select></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div><label className="text-xs text-gray-500">補償プラン</label><select value={f.insurance} onChange={e=>upF("insurance",e.target.value)} className="input-s"><option>免責</option><option>NOC</option></select></div>
          <div><label className="text-xs text-gray-500">OTA（予約先）</label><select value={f.ota} onChange={e=>upF("ota",e.target.value)} className="input-s">{Object.entries(OTA).map(([k,o])=><option key={k} value={k}>{o.name}</option>)}<option value="direct">直接予約</option></select></div>
        </div>
        <div><label className="text-xs text-gray-500">予約番号</label><input value={f.id} onChange={e=>upF("id",e.target.value)} className="input-s"/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div><label className="text-xs text-gray-500">お届け場所</label><input value={f.delPlace} onChange={e=>upF("delPlace",e.target.value)} className="input-s" placeholder="新千歳空港 etc."/></div>
          <div><label className="text-xs text-gray-500">回収場所</label><input value={f.colPlace} onChange={e=>upF("colPlace",e.target.value)} className="input-s" placeholder="新千歳空港 etc."/></div>
        </div>
        <div><label className="text-xs text-gray-500">到着便名</label><input value={f.flight||""} onChange={e=>upF("flight",e.target.value)} className="input-s" placeholder="ANA123"/></div>
        <button onClick={submit} className="btn-primary w-full" style={{padding:10,marginTop:8}}>予約を登録</button>
      </div>}
    </div>
  </div></div>;
}

/* ==========================================
   タイムテーブル
   ========================================== */
function TimeTable({tasks,staffCount}){
  const lend=tasks.filter(t=>["DEL","PU","来店"].includes(t.type));const ret=tasks.filter(t=>["COL","BD","返却"].includes(t.type));
  const rows=[{l:"人員",bg:"#e0e7ff",fg:"#4338ca",b:true,data:SLOTS.map(()=>staffCount),total:staffCount},{l:"貸出計",bg:"#dbeafe",fg:"#1e40af",b:true,w:true,data:SLOTS.map(s=>lend.filter(t=>t.time===s).length),total:lend.length},{l:"┗DEL",bg:"#eff6ff",fg:"#2563eb",data:SLOTS.map(s=>tasks.filter(t=>t.type==="DEL"&&t.time===s).length),total:tasks.filter(t=>t.type==="DEL").length},{l:"┗PU/来店",bg:"#f5f3ff",fg:"#6d28d9",data:SLOTS.map(s=>tasks.filter(t=>(t.type==="PU"||t.type==="来店")&&t.time===s).length),total:tasks.filter(t=>t.type==="PU"||t.type==="来店").length},{l:"返却計",bg:"#ffedd5",fg:"#c2410c",b:true,w:true,data:SLOTS.map(s=>ret.filter(t=>t.time===s).length),total:ret.length},{l:"┗COL",bg:"#fff7ed",fg:"#ea580c",data:SLOTS.map(s=>tasks.filter(t=>t.type==="COL"&&t.time===s).length),total:tasks.filter(t=>t.type==="COL").length},{l:"┗返却/BD",bg:"#fffbeb",fg:"#b45309",data:SLOTS.map(s=>tasks.filter(t=>(t.type==="返却"||t.type==="BD")&&t.time===s).length),total:tasks.filter(t=>t.type==="返却"||t.type==="BD").length},{l:"洗車/他",bg:"#f8fafc",fg:"#64748b",data:SLOTS.map(s=>tasks.filter(t=>!["DEL","PU","来店","COL","BD","返却"].includes(t.type)&&t.time===s).length),total:tasks.filter(t=>!["DEL","PU","来店","COL","BD","返却"].includes(t.type)).length}];

}

/* ==========================================
   配車管理タイムライン（ガントチャート）
   ========================================== */
function FleetTimeline({data,fleet,onFleetChange,today,maintenance,onMaintenanceChange,vehicles,vehicleClasses,onAddReservation,onBulkAddReservation,onCancelReservation,onReassignVehicle}){
  const scrollRef=useRef(null);const[tooltip,setTooltip]=useState(null);const[viewMode,setViewMode]=useState("month");const[baseDate,setBaseDate]=useState(today);const[collapsed,setCollapsed]=useState(()=>window.innerWidth<=768?{unassignedAlert:true}:{});const[showMaintForm,setShowMaintForm]=useState(null);const[showResForm,setShowResForm]=useState(null);
  const[dragInfo,setDragInfo]=useState(null);const[dropTarget,setDropTarget]=useState(null);
  const WK=["日","月","火","水","木","金","土"];

  const dates=useMemo(()=>{const dt=new Date(baseDate);if(viewMode==="month"){const y=dt.getFullYear(),m=dt.getMonth();const days=new Date(y,m+1,0).getDate();return Array.from({length:days},(_,i)=>{const d=new Date(y,m,i+1);return d.toISOString().split("T")[0];});}else if(viewMode==="week"){const d=new Date(baseDate);d.setDate(d.getDate()-d.getDay());return Array.from({length:7},(_,i)=>dOff(d.toISOString().split("T")[0],i));}else return[baseDate];},[baseDate,viewMode]);

  const[isMobile,setIsMobile]=useState(window.innerWidth<=768);
  useEffect(()=>{const h=()=>setIsMobile(window.innerWidth<=768);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
  const COL_W=viewMode==="month"?(isMobile?60:80):viewMode==="week"?(isMobile?100:140):600;const LEFT_W=isMobile?100:260;const ROW_H=30;const CLASS_H=28;
  const monthLabel=useMemo(()=>{const dt=new Date(baseDate);return`${dt.getFullYear()}年${dt.getMonth()+1}月`;},[baseDate]);

  useEffect(()=>{if(scrollRef.current){const ti=dates.indexOf(today);if(ti>=0)scrollRef.current.scrollLeft=Math.max(0,(ti-2)*COL_W);}},[dates,today]);
  const goToday=()=>setBaseDate(today);
  const goPrev=()=>{const dt=new Date(baseDate);if(viewMode==="month")dt.setMonth(dt.getMonth()-1);else if(viewMode==="week")dt.setDate(dt.getDate()-7);else dt.setDate(dt.getDate()-1);setBaseDate(dt.toISOString().split("T")[0]);};
  const goNext=()=>{const dt=new Date(baseDate);if(viewMode==="month")dt.setMonth(dt.getMonth()+1);else if(viewMode==="week")dt.setDate(dt.getDate()+7);else dt.setDate(dt.getDate()+1);setBaseDate(dt.toISOString().split("T")[0]);};
  const toggleClass=(t)=>setCollapsed(p=>({...p,[t]:!p[t]}));

  const vehicleBars=useMemo(()=>{
    const bars={};vehicles.forEach(v=>{bars[v.code]=[];});
    data.forEach(r=>{const vc=fleet[r.id];if(!vc||!bars[vc])return;const ld=norm(r.lendDate),rd=norm(r.returnDate);const si=dates.indexOf(ld),ei=dates.indexOf(rd);if(si<0&&ei<0)return;const s=Math.max(si,0),e=Math.min(ei>=0?ei:dates.length-1,dates.length-1);bars[vc].push({type:"reservation",r,startI:s,endI:e,left:s*COL_W,width:(e-s+1)*COL_W-2});});
    (maintenance||[]).forEach(m=>{if(!bars[m.vehicleCode])return;const si=dates.indexOf(m.startDate),ei=dates.indexOf(m.endDate);if(si<0&&ei<0)return;const s=Math.max(si,0),e=Math.min(ei>=0?ei:dates.length-1,dates.length-1);bars[m.vehicleCode].push({type:"maintenance",m,startI:s,endI:e,left:s*COL_W,width:(e-s+1)*COL_W-2});});
    return bars;
  },[data,fleet,dates,maintenance,vehicles]);

  // 車両ごとの月別稼働率（表示期間の月の1日〜末日で計算）
  const utilRates=useMemo(()=>{
    const bd=new Date(baseDate);const y=bd.getFullYear(),m=bd.getMonth();
    const dim=new Date(y,m+1,0).getDate(); // 月の日数
    const rates={};
    vehicles.forEach(v=>{
      let days=0;
      // 予約による稼働日数
      data.forEach(r=>{if(fleet[r.id]!==v.code)return;
        const ld=new Date(norm(r.lendDate)),rd=new Date(norm(r.returnDate));
        const ms=new Date(y,m,1),me=new Date(y,m,dim);
        const s=ld>ms?ld:ms;const e=rd<me?rd:me;
        if(s<=e)days+=Math.round((e-s)/86400000)+1;
      });
      // メンテナンスによる稼働日数
      (maintenance||[]).forEach(mt=>{if(mt.vehicleCode!==v.code)return;
        const ld=new Date(norm(mt.startDate)),rd=new Date(norm(mt.endDate));
        const ms=new Date(y,m,1),me=new Date(y,m,dim);
        const s=ld>ms?ld:ms;const e=rd<me?rd:me;
        if(s<=e)days+=Math.round((e-s)/86400000)+1;
      });
      rates[v.code]={days:Math.min(days,dim),total:dim,pct:Math.min(Math.round(days/dim*100),100)};
    });
    return rates;
  },[data,fleet,vehicles,maintenance,baseDate]);

  // セルクリック → アクション選択
  const[cellAction,setCellAction]=useState(null);
  const handleCellClick=(vehicleCode,dateStr)=>{
    const existing=data.find(r=>fleet[r.id]===vehicleCode&&norm(r.lendDate)<=dateStr&&norm(r.returnDate)>=dateStr);
    if(existing){setTooltip({type:"reservation",...existing,vc:vehicleCode});return;}
    setCellAction({vehicleCode,date:dateStr});
  };
  const handleBarClick=(e,b)=>{e.stopPropagation();if(b.type==="reservation")setTooltip({type:"reservation",...b.r,vc:fleet[b.r.id]});else setTooltip({type:"maintenance",...b.m});};

  const addMaint=(vc,start,end,label)=>{const m={id:"m"+Date.now(),vehicleCode:vc,startDate:start,endDate:end,label};const next=[...(maintenance||[]),m];onMaintenanceChange(next);DB.saveMaintenance([m]);setShowMaintForm(null);};
  const removeMaint=(id)=>{onMaintenanceChange((maintenance||[]).filter(m=>m.id!==id));DB.deleteMaintenance(id);setTooltip(null);};

  // ドラッグ&ドロップで車両変更
  const handleDragStart=(e,resId)=>{e.dataTransfer.setData("text/plain",resId);e.dataTransfer.effectAllowed="move";setDragInfo(resId);};
  const handleDragEnd=()=>{setDragInfo(null);setDropTarget(null);};
  const handleDragOver=(e,vehicleCode)=>{
    if(!dragInfo)return;e.preventDefault();e.dataTransfer.dropEffect="move";
    const res=data.find(r=>r.id===dragInfo);if(!res)return;
    const curVc=fleet[dragInfo];if(curVc===vehicleCode){setDropTarget(null);return;}
    // 日付重複のみチェック（クラス制限なし）
    const conflict=checkVehicleConflict(vehicleCode,dragInfo,data,fleet);
    setDropTarget({vc:vehicleCode,ok:!conflict,conflict});
  };
  const handleDrop=(e,vehicleCode)=>{
    e.preventDefault();const resId=e.dataTransfer.getData("text/plain");if(!resId)return;
    setDragInfo(null);setDropTarget(null);
    const res=data.find(r=>r.id===resId);if(!res)return;
    const curVc=fleet[resId];if(curVc===vehicleCode)return;
    const curV=vehicles.find(v=>v.code===curVc);const targetV=vehicles.find(v=>v.code===vehicleCode);
    const conflict=checkVehicleConflict(vehicleCode,resId,data,fleet);
    if(conflict){alert((targetV?targetV.name:vehicleCode)+" は "+fmtD(conflict.lendDate)+"〜"+fmtD(conflict.returnDate)+" に「"+conflict.name+"」様の予約が入っているため変更できません。");return;}
    if(!window.confirm(res.name+" 様の配車を\n「"+(curV?curV.name:"未割当")+"」→「"+(targetV?targetV.name:vehicleCode)+"」\nに変更しますか？\n\n※OPシートの車両情報も同時に更新されます"))return;
    if(onReassignVehicle)onReassignVehicle(resId,vehicleCode);
    else onFleetChange({...fleet,[resId]:vehicleCode});
  };

  const groups=useMemo(()=>vehicleClasses.map(vc=>({...vc,items:vehicles.filter(v=>v.type===vc.type)})).filter(g=>g.items.length>0),[vehicles,vehicleClasses]);

  return <div style={{display:"flex",flexDirection:"column",background:"#fff",borderRadius:12,boxShadow:"0 1px 3px rgba(0,0,0,.06)",border:"1px solid #e5e7eb",overflow:"hidden",height:"100%",minHeight:0}}>
    <div style={{padding:isMobile?"4px 6px":"8px 12px",background:"#f8fafc",borderBottom:"1px solid #e5e7eb",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:isMobile?4:8,flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:isMobile?2:8}}>
        <button onClick={goToday} style={{padding:isMobile?"2px 4px":"4px 8px",background:"#fff",border:"1px solid #d1d5db",borderRadius:4,fontSize:isMobile?9:12,fontWeight:600,cursor:"pointer"}}>今日</button>
        <button onClick={goPrev} style={{padding:isMobile?"2px 4px":"4px 8px",background:"#fff",border:"1px solid #d1d5db",borderRadius:4,fontSize:isMobile?10:14,cursor:"pointer"}}>◀</button>
        <button onClick={goNext} style={{padding:isMobile?"2px 4px":"4px 8px",background:"#fff",border:"1px solid #d1d5db",borderRadius:4,fontSize:isMobile?10:14,cursor:"pointer"}}>▶</button>
        <span style={{fontSize:isMobile?11:14,fontWeight:700,color:"#1e293b",marginLeft:2}}>{monthLabel}</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:isMobile?2:8}}>
        <button onClick={()=>setShowResForm({})} style={{padding:isMobile?"2px 6px":"4px 8px",background:"#16a34a",color:"#fff",border:"none",borderRadius:4,fontSize:isMobile?9:12,fontWeight:700,cursor:"pointer"}}>＋予約</button>
        <div style={{display:"flex",border:"1px solid #d1d5db",borderRadius:4,overflow:"hidden"}}>{["day","week","month"].map(m=><button key={m} onClick={()=>setViewMode(m)} style={{padding:isMobile?"2px 4px":"4px 8px",fontSize:isMobile?9:12,fontWeight:600,background:viewMode===m?"#1e40af":"#fff",color:viewMode===m?"#fff":"#374151",border:"none",cursor:"pointer"}}>{m}</button>)}</div>
      </div>
    </div>

    {((unassigned)=>{const ua=data.filter(r=>r.status!=="cancelled"&&!fleet[r.id]);return ua.length>0?<div style={{borderBottom:"1px solid #fca5a5",background:"#fef2f2",padding:isMobile?"4px 8px":"12px 16px",flexShrink:0,maxHeight:collapsed.unassignedAlert?36:isMobile?120:undefined,overflow:"hidden"}}>

        <table style={{fontSize:10,borderCollapse:"collapse",width:"100%"}}>
          <thead><tr style={{background:"#fee2e2"}}>

            <th style={{padding:"4px 6px",textAlign:"center",fontWeight:700,border:"1px solid #fca5a5"}}>貸出日/時間</th>
            <th style={{padding:"4px 6px",textAlign:"center",fontWeight:700,border:"1px solid #fca5a5"}}>返却日/時間</th>

            <th style={{padding:"4px 6px",textAlign:"left",fontWeight:700,border:"1px solid #fca5a5"}}>お届け場所</th>
            <th style={{padding:"4px 6px",textAlign:"left",fontWeight:700,border:"1px solid #fca5a5"}}>回収場所</th>
          </tr></thead>
          <tbody>
            {ua.map(r=><tr key={r.id} style={{background:"#fff5f5",borderBottom:"1px solid #fca5a5"}}>
              <td style={{padding:"4px 6px",border:"1px solid #fca5a5"}}><OBadge ota={r.ota}/></td>
              <td style={{padding:"4px 6px",border:"1px solid #fca5a5",fontFamily:"monospace",fontSize:9}}>{r.id}</td>
              <td style={{padding:"4px 6px",border:"1px solid #fca5a5"}}>{r.name}</td>
              <td style={{padding:"4px 6px",border:"1px solid #fca5a5",textAlign:"center"}}>{r.vehicle}</td>
              <td style={{padding:"4px 6px",border:"1px solid #fca5a5",textAlign:"center",fontSize:9}}>{fmtD(r.lendDate)}<br/>{r.lendTime}</td>
              <td style={{padding:"4px 6px",border:"1px solid #fca5a5",textAlign:"center",fontSize:9}}>{fmtD(r.returnDate)}<br/>{r.returnTime}</td>
              <td style={{padding:"4px 6px",border:"1px solid #fca5a5",textAlign:"center"}}>{r.insurance}</td>
              <td style={{padding:"4px 6px",border:"1px solid #fca5a5"}}>{r.delPlace||"—"}</td>
              <td style={{padding:"4px 6px",border:"1px solid #fca5a5"}}>{r.colPlace||"—"}</td>
            </tr>)}
          </tbody>
        </table>
      </div>}
    </div>:null;})()}

    <div ref={scrollRef} style={{flex:1,overflow:"auto",position:"relative"}}>
      <table style={{borderCollapse:"collapse",minWidth:LEFT_W+dates.length*COL_W}}>
        <thead><tr style={{position:"sticky",top:0,zIndex:10}}>
          <th style={{position:"sticky",left:0,zIndex:11,width:LEFT_W,minWidth:LEFT_W,height:44,background:"#f1f5f9",borderBottom:"2px solid #94a3b8",borderRight:"2px solid #94a3b8",padding:"0 8px",textAlign:"left",fontSize:11,fontWeight:700,color:"#1e293b"}}>車両</th>
          {dates.map(d=>{const dt=new Date(d);const dow=dt.getDay();const isToday=d===today;return <th key={d} style={{width:COL_W,minWidth:COL_W,height:44,textAlign:"center",borderRight:"1px solid #cbd5e1",background:isToday?"#dbeafe":"#f1f5f9",borderBottom:"2px solid #94a3b8",padding:0}}><div style={{fontSize:isMobile?9:11,fontWeight:600,color:isToday?"#1d4ed8":"#334155"}}>{dt.getDate()}<span style={{fontSize:isMobile?8:9,fontWeight:dow===0||dow===6?700:400,color:dow===0?"#dc2626":dow===6?"#2563eb":"#64748b",marginLeft:1}}>{WK[dow]}</span></div></th>;})}
        </tr></thead>
        <tbody>
          {groups.map(g=><React.Fragment key={g.type}>
            <tr onClick={()=>toggleClass(g.type)} style={{cursor:"pointer",userSelect:"none"}}>
              <td style={{position:"sticky",left:0,zIndex:5,height:CLASS_H,background:"#f8fafc",borderBottom:"1px solid #e2e8f0",borderRight:"2px solid #94a3b8",padding:"0 6px"}}><span style={{fontSize:10,color:"#64748b",marginRight:3}}>{collapsed[g.type]?"▶":"▼"}</span><span style={{fontSize:isMobile?9:10,fontWeight:700,color:"#334155"}}>{isMobile?g.type:g.type+"クラス（"+g.label+"）"}</span></td>
              {dates.map(d=><td key={d} style={{height:CLASS_H,borderBottom:"1px solid #e2e8f0",background:"#f8fafc",borderRight:"1px solid #e2e8f0"}}/>)}
            </tr>
            {!collapsed[g.type]&&g.items.map(v=>{const bars=vehicleBars[v.code]||[];const isDT=dropTarget&&dropTarget.vc===v.code;const rowHL=isDT?(dropTarget.ok?"rgba(34,197,94,.15)":"rgba(239,68,68,.1)"):"transparent";return <tr key={v.id} onDragOver={e=>handleDragOver(e,v.code)} onDragLeave={()=>setDropTarget(null)} onDrop={e=>handleDrop(e,v.code)} style={{outline:isDT?(dropTarget.ok?"2px solid #22c55e":"2px dashed #ef4444"):"none"}}>
              <td style={{position:"sticky",left:0,zIndex:5,height:ROW_H,background:isDT?(dropTarget.ok?"#dcfce7":"#fef2f2"):"#fff",borderBottom:"1px solid #f1f5f9",borderRight:"2px solid #94a3b8",padding:isMobile?"0 4px":"0 10px",overflow:"hidden",whiteSpace:"nowrap",transition:"background .15s"}}>

                {di===0&&bars.map((b,bi)=>{const isRes=b.type==="reservation";const isDragging=dragInfo===b.r?.id;return <div key={bi} className="tl-bar" draggable={isRes} onDragStart={isRes?e=>handleDragStart(e,b.r.id):undefined} onDragEnd={handleDragEnd} onClick={e=>handleBarClick(e,b)} style={{left:b.left,width:Math.max(b.width,20),background:isRes?(isDragging?"#f87171":"#dc2626"):"#2563eb",color:"#fff",fontSize:9,fontWeight:600,boxShadow:isDragging?"0 4px 12px rgba(0,0,0,.3)":"0 1px 3px rgba(0,0,0,.2)",position:"absolute",top:3,bottom:3,zIndex:isDragging?10:2,opacity:isDragging?0.7:1,cursor:isRes?"grab":"pointer",transition:"opacity .15s, box-shadow .15s"}}><span style={{overflow:"hidden",textOverflow:"ellipsis"}}>{isRes?`${b.r.lendTime}-${b.r.returnTime} ${b.r.name} 様`:(b.m.label)}</span></div>;})}
              </td>;})}
            </tr>;})}
          </React.Fragment>)}
        </tbody>
      </table>
    </div>

    {cellAction&&<div className="modal-overlay" onClick={()=>setCellAction(null)}><div className="modal-box" style={{maxWidth:280,padding:20}} onClick={e=>e.stopPropagation()}>
      <h4 className="font-bold text-sm mb-3">{cellAction.vehicleCode} — {fmtD(cellAction.date)}</h4>
      <div className="space-y-2">
        <button onClick={()=>{const v=vehicles.find(x=>x.code===cellAction.vehicleCode);setShowResForm({vehicleCode:cellAction.vehicleCode,lendDate:cellAction.date,vehicle:v?.type||"A"});setCellAction(null);}} className="w-full py-2 bg-green-600 text-white rounded-lg text-sm font-bold hover:bg-green-700">新規予約を登録</button>
        <button onClick={()=>{setShowMaintForm(cellAction);setCellAction(null);}} className="w-full py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700">メンテナンス登録</button>

                return <select value={t.assignedVehicle||""} onChange={e=>{const vc=e.target.value;const vn=vehicles.find(x=>x.code===vc);if(vc&&!window.confirm("「"+(vn?vn.name+" "+vn.no:"")+"」に配車しますか？\n※配車表にも反映されます"))return;if(!vc&&t.assignedVehicle&&!window.confirm("配車を解除しますか？"))return;const newV=vn?vn.type:t.vehicle;const newP=vn?vn.no:"";setTasks(ts=>ts.map(x=>x.reservationId===t.reservationId?{...x,assignedVehicle:vc,plateNo:newP,vehicle:newV}:x));DB.updateTask({...t,assignedVehicle:vc,plateNo:newP,vehicle:newV},selDate);if(t.reservationId&&vc)onFleetChange({...fleet,[t.reservationId]:vc});else if(t.reservationId&&!vc){const nf={...fleet};delete nf[t.reservationId];onFleetChange(nf);}}} style={{border:t.assignedVehicle?"none":"2px solid #dc2626",background:t.assignedVehicle?"transparent":"#fef2f2",fontSize:9,width:"100%",padding:0,fontWeight:700,color:t.assignedVehicle?"#1e40af":"#dc2626",borderRadius:3}}><option value="">未配車</option>{classes.map(cls=><optgroup key={cls} label={cls+"クラス"}>{vehicles.filter(v=>v.type===cls).map(v=>{const conflict=v.code!==t.assignedVehicle&&checkVehicleConflict(v.code,t.reservationId,reservations,fleet);return <option key={v.code} value={v.code} disabled={conflict} style={{color:conflict?"#ccc":"#111"}}>{v.name} ({v.no}){conflict?" ×":""}</option>;})}</optgroup>)}</select>;
              })()}</td>
              <td style={{...cellS(10),fontFamily:"monospace",fontSize:9,fontWeight:700,color:t.plateNo?"#2563eb":"#ccc"}}>{t.plateNo||"-"}</td>
              {["b","c","j","usb","parasol"].map((k,ki)=><td key={k} style={cellS(11+ki)}>{(isLend||isWash)?<input type="checkbox" checked={liveOpts[k]||false} onChange={e=>{const newOpts={...liveOpts,[k]:e.target.checked};upd(t._id,{...t,opts:newOpts});}} style={{width:11,height:11}}/>:""}</td>)}
              <td style={{...cellS(16),fontWeight:600,color:t.insurance==="NOC"?"#b45309":"#64748b",fontSize:9}}>{t.manual?<input value={t.insurance||""} onChange={e=>upd(t._id,{...t,insurance:e.target.value})} style={{border:"none",background:"transparent",fontSize:9,width:"100%",padding:0}} placeholder="-"/>:(t.insurance||"")}</td>
              <td style={cellS(17)}>{t.insuranceChange||""}</td>
              <td style={cellS(18)}><input value={t.memo||""} onChange={e=>upd(t._id,{...t,memo:e.target.value})} style={{border:"none",background:"transparent",fontSize:9,width:"100%",padding:0}} placeholder="-"/></td>
              {["yakkan","line","payment"].map((k,ki)=><td key={k} style={cellS(19+ki)}>{isLend?<input type="checkbox" checked={t[k]||false} onChange={e=>upd(t._id,{...t,[k]:e.target.checked})} style={{width:11,height:11}}/>:""}</td>)}
              <td style={cellS(22)}>{t.manual?<input value={t.returnDate||""} onChange={e=>upd(t._id,{...t,returnDate:e.target.value})} style={{border:"none",background:"transparent",fontSize:9,width:"100%",padding:0}} placeholder="-"/>:(isLend?fmtD(t.returnDate):"")}</td><td style={cellS(23)}>{t.manual?<input value={t.returnTime||""} onChange={e=>upd(t._id,{...t,returnTime:e.target.value})} style={{border:"none",background:"transparent",fontSize:9,width:"100%",padding:0}} placeholder="-"/>:(isLend?t.returnTime||"":"")}</td><td style={cellS(24)}>{isLend?t.returnType||"":""}</td><td style={cellS(25)}>{t.manual?<input value={t.colPlace||""} onChange={e=>upd(t._id,{...t,colPlace:e.target.value})} style={{border:"none",background:"transparent",fontSize:9,width:"100%",padding:0}} placeholder="-"/>:(isLend?<PlaceLink place={t.colPlace} style={{fontSize:9}}/>:"")}</td><td style={cellS(26)}>{t.flight||""}</td>
              <td style={cellS(27)}>{t.ota?<OBadge ota={t.ota}/>:""}</td><td style={{...cellS(28),fontFamily:"monospace",fontSize:8}}>{t.reservationId||""}</td><td style={cellS(29)}>{t.manual?<input value={t.tel||""} onChange={e=>upd(t._id,{...t,tel:e.target.value})} style={{border:"none",background:"transparent",fontSize:9,width:"100%",padding:0}} placeholder="-"/>:(t.tel||"")}</td><td style={{...cellS(30),fontSize:8}}>{t.manual?<input value={t.mail||""} onChange={e=>upd(t._id,{...t,mail:e.target.value})} style={{border:"none",background:"transparent",fontSize:9,width:"100%",padding:0}} placeholder="-"/>:(t.mail||"")}</td>
            </tr>;
          })}
          {sortedTasks.length===0&&<tr><td colSpan={31} style={{textAlign:"center",padding:16,color:"#94a3b8",fontSize:11}}>この日のタスクはありません</td></tr>}
        </tbody></table>
      </div></div>
      <TimeTable tasks={tasks} staffCount={staffCount}/>
    </div>
  </div>;
}

/* ==========================================
   App
   ========================================== */
function App(){
  const[data,setData]=useState([]);const[tab,setTab]=useState("import");const today=new Date().toISOString().split("T")[0];
  const[fleet,setFleet]=useState({});const[maintenance,setMaintenance]=useState([]);const[shifts,setShifts]=useState({});const[showOP,setShowOP]=useState(false);
  const[staff,setStaff]=useState(INIT_STAFF);
  const[vehicles,setVehicles]=useState(INIT_VEHICLES);
  const vehicleClasses=INIT_CLASSES;
  const[pendingPlaces,setPendingPlaces]=useState(null);
  // オプション情報をlocalStorageで管理（DB非依存）
  const[resOpts,setResOpts]=useState(()=>{try{return JSON.parse(localStorage.getItem("spk_res_opts")||"{}}");}catch(e){return{};}});
  const saveResOpts=(newOpts)=>{setResOpts(newOpts);try{localStorage.setItem("spk_res_opts",JSON.stringify(newOpts));}catch(e){}};
  const[csvFiles,setCsvFiles]=useState({});const[csvLogs,setCsvLogs]=useState([]);const[csvPlaceLogs,setCsvPlaceLogs]=useState([]);
  const[sbConnected,setSbConnected]=useState(false);
  const[dbLoaded,setDbLoaded]=useState(!SB_ENABLED);

  // --- Supabase 初期ロード ---
  useEffect(()=>{
    if(!SB_ENABLED)return;
    (async()=>{
      try{
        const[resDB,flDB,stDB,vhDB,shDB,mtDB]=await Promise.all([
          DB.fetchReservations(),DB.fetchFleet(),DB.fetchStaff(),DB.fetchVehicles(),DB.fetchShifts(),DB.fetchMaintenance()
        ]);
        if(resDB.length)setData(resDB);
        if(Object.keys(flDB).length)setFleet(flDB);
        if(stDB&&stDB.length)setStaff(stDB);
        if(vhDB&&vhDB.length)setVehicles(vhDB);
        if(shDB)setShifts(shDB);
        if(mtDB&&mtDB.length)setMaintenance(mtDB);
        setSbConnected(true);
      }catch(e){console.error("DB load error:",e);}
      setDbLoaded(true);
    })();
  },[]);

  // --- Supabase Realtime ---
  useEffect(()=>{
    if(!sb)return;
    const ch=sb.channel("spk-realtime")
      .on("postgres_changes",{event:"*",schema:"public",table:"reservations"},payload=>{
        if(payload.eventType==="INSERT"||payload.eventType==="UPDATE"){
          const r=DB._fromDbRes(payload.new);
          setData(prev=>{const idx=prev.findIndex(x=>x.id===r.id);if(idx>=0){const n=[...prev];n[idx]=r;return n;}return[...prev,r];});
        }else if(payload.eventType==="DELETE"){
          setData(prev=>prev.filter(x=>x.id!==payload.old.id));
        }
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"fleet"},payload=>{
        if(payload.eventType==="DELETE"){
          setFleet(prev=>{const n={...prev};delete n[payload.old.reservation_id];return n;});
        }else{
          setFleet(prev=>({...prev,[payload.new.reservation_id]:payload.new.vehicle_code}));
        }
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"tasks"},()=>{/* OPScreen handles its own refresh */})
      .on("postgres_changes",{event:"*",schema:"public",table:"shifts"},payload=>{
        const s=payload.new;if(!s)return;
        setShifts(prev=>{const n={...prev};if(!n[s.date])n[s.date]=[];const arr=n[s.date].filter(x=>x.name!==s.staff_name);arr.push({name:s.staff_name,symbol:s.symbol,start:s.start_time,end:s.end_time,memo:s.memo});n[s.date]=arr;return{...n};});
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"staff"},async()=>{
        const st=await DB.fetchStaff();if(st&&st.length)setStaff(st);
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"vehicles"},async()=>{
        const vh=await DB.fetchVehicles();if(vh&&vh.length)setVehicles(vh);
      })
      .subscribe((status)=>{setSbConnected(status==="SUBSCRIBED");});
    return()=>{sb.removeChannel(ch);};
  },[]);

  // --- Supabase連携ラッパー（DB呼び出しをsetState外で実行）---
  const setStaffSync=useCallback((fn)=>{
    const next=typeof fn==="function"?fn(staff):fn;
    setStaff(next);
    DB.saveStaff(next).catch(e=>console.error("saveStaff error:",e));
  },[staff]);
  const setVehiclesSync=useCallback((fn)=>{
    const next=typeof fn==="function"?fn(vehicles):fn;
    setVehicles(next);
    DB.saveVehicles(next).catch(e=>console.error("saveVehicles error:",e));
  },[vehicles]);
  const setShiftsSync=useCallback((fn)=>{
    const next=typeof fn==="function"?fn(shifts):fn;
    setShifts(next);
  },[shifts]);
  const setFleetSync=useCallback((nextFleet)=>{
    const resolved=typeof nextFleet==="function"?nextFleet(fleet):nextFleet;
    setFleet(resolved);
    DB.upsertFleet(resolved).catch(e=>console.error("upsertFleet error:",e));
  },[fleet]);

  // 配車変更 + OPシートタスク同時更新
  const reassignVehicle=useCallback(async(resId,newVc)=>{
    const nextFleet={...fleet,[resId]:newVc};
    setFleet(nextFleet);
    DB.upsertFleet(nextFleet).catch(e=>console.error("upsertFleet error:",e));
    const vn=vehicles.find(x=>x.code===newVc);
    if(!SB_ENABLED||!vn)return;
    // OPシートの該当タスクも更新（全日分チェック）
    const res=data.find(r=>r.id===resId);if(!res)return;
    const ld=norm(res.lendDate),rd=norm(res.returnDate);
    // 貸出日のタスクを更新
    try{
      const tasks=await DB.fetchTasks(ld);
      if(tasks&&tasks.length){
        const updated=tasks.map(t=>t.reservationId===resId?{...t,assignedVehicle:newVc,plateNo:vn.no||"",vehicle:vn.type||t.vehicle}:t);
        if(JSON.stringify(updated)!==JSON.stringify(tasks))DB.upsertTasks(updated,ld);
      }
      if(rd!==ld){const tasks2=await DB.fetchTasks(rd);if(tasks2&&tasks2.length){const updated2=tasks2.map(t=>t.reservationId===resId?{...t,assignedVehicle:newVc,plateNo:vn.no||"",vehicle:vn.type||t.vehicle}:t);if(JSON.stringify(updated2)!==JSON.stringify(tasks2))DB.upsertTasks(updated2,rd);}}
      // 前日の洗車タスクも更新
      const prevDay=dOff(ld,-1);
      const tasks3=await DB.fetchTasks(prevDay);
      if(tasks3&&tasks3.length){const updated3=tasks3.map(t=>t.reservationId===resId?{...t,assignedVehicle:newVc,plateNo:vn.no||"",vehicle:vn.type||t.vehicle}:t);if(JSON.stringify(updated3)!==JSON.stringify(tasks3))DB.upsertTasks(updated3,prevDay);}
    }catch(e){console.error("task vehicle update error:",e);}
  },[fleet,vehicles,data]);

  const imp=useCallback(d=>{
    let imported=d;
    if(pendingPlaces&&Object.keys(pendingPlaces).length>0){
      imported=d.map(r=>{const p=pendingPlaces[r.id];if(p)return{...r,delPlace:p.delPlace||r.delPlace,colPlace:p.colPlace||r.colPlace};return r;});
    }
    // 既存データとマージ: 同一予約番号は上書き、新規は追加
    const map=new Map(data.map(r=>[r.id,r]));
    imported.forEach(r=>map.set(r.id,r));
    const allData=[...map.values()];
    setData(allData);
    // 配車データ: CSVにない予約のfleetエントリを削除
    const allIds=new Set(allData.map(r=>r.id));
    const cleanFleet={};Object.entries(fleet).forEach(([rid,vc])=>{if(allIds.has(rid))cleanFleet[rid]=vc;});
    // 自動配車: 未配車の予約に車両を自動割当
    const newFleet=autoAssign(allData,vehicles,cleanFleet,maintenance);
    setFleet(newFleet);
    setTab("fleet");
    // オプション情報をlocalStorageに保存（DB非依存で確実）
    const newResOpts={...resOpts};
    imported.forEach(r=>{newResOpts[r.id]={b:!!r.optB,c:!!r.optC,j:!!r.optJ,usb:!!r.optUSB,parasol:!!r.optParasol};});
    saveResOpts(newResOpts);
    // DB保存（非同期）
    DB.upsertReservations(imported).then(()=>dbLog("imp reservations",true,imported.length+"件")).catch(e=>dbLog("imp reservations",false,e.message));
    DB.upsertFleet(newFleet).catch(e=>dbLog("imp fleet",false,e.message));
    // インポート後、既存タスクのオプション情報を強制更新
    (async()=>{
      const rOptsMap={};imported.forEach(r=>{rOptsMap[r.id]={b:!!r.optB,c:!!r.optC,j:!!r.optJ,usb:!!r.optUSB,parasol:!!r.optParasol};});
      const affDates=new Set();
      imported.forEach(r=>{
        if(r.lendDate){affDates.add(r.lendDate);affDates.add(dOff(r.lendDate,-1));}
        if(r.returnDate)affDates.add(r.returnDate);
      });
      for(const d of affDates){
        try{
          const ts=await DB.fetchTasks(d);
          if(!ts||!ts.length)continue;
          let ch=false;
          const upd=ts.map(t=>{
            const ro=rOptsMap[t.reservationId];if(!ro)return t;
            const co=t.opts||{};
            if(ro.b!==!!co.b||ro.c!==!!co.c||ro.j!==!!co.j||ro.usb!==!!co.usb||ro.parasol!==!!co.parasol){ch=true;return{...t,opts:{...ro}};}
            return t;
          });
          if(ch)DB.upsertTasks(upd,d);
        }catch(e){}
      }
    })();
  },[data,vehicles,fleet,pendingPlaces,maintenance]);

  const addReservation=useCallback((r,vehicleCode)=>{
    const newData=[...data,r];
    setData(newData);
    DB.upsertReservations([r]);
    if(vehicleCode){
      setFleet(prev=>({...prev,[r.id]:vehicleCode}));
      DB.updateFleetOne(r.id,vehicleCode);
    }else{
      // 自動配車
      const newFleet=autoAssign(newData,vehicles,fleet,maintenance);
      setFleet(newFleet);
      DB.upsertFleet(newFleet);
    }
  },[data,vehicles,fleet,maintenance]);

  const bulkAddReservation=useCallback((rArr,fl)=>{
    const ids=new Set(data.map(r=>r.id));
    const newOnes=rArr.filter(r=>!ids.has(r.id));
    setData(prev=>[...prev,...newOnes]);
    setFleet(prev=>({...prev,...fl}));
    DB.upsertReservations(newOnes);
    DB.upsertFleet(fl);
  },[data]);

  const cancelReservation=useCallback((id)=>{
    setData(prev=>prev.filter(r=>r.id!==id));
    const nf={...fleet};delete nf[id];
    setFleet(nf);
    DB.deleteFleetOne(id);
  },[fleet]);

  const updatePlaces=useCallback((places)=>{
    let matched=0;
    const updated=data.map(r=>{
      const p=places[r.id];
      if(p){matched++;return{...r,delPlace:p.delPlace||r.delPlace,colPlace:p.colPlace||r.colPlace};}
      return r;
    });
    setData(updated);
    const unmatched=Object.keys(places).length-matched;
    // DB保存
    DB.upsertPlaces(places);
    const changed=updated.filter(r=>places[r.id]);
    if(changed.length)DB.upsertReservations(changed);
    return{matched,unmatched};
  },[data]);

  const oc=useMemo(()=>{const c={};data.forEach(t=>{c[t.ota]=(c[t.ota]||0)+1;});return c;},[data]);
  const navItems=[{id:"import",ico:"📁",l:"CSV"},{id:"staff",ico:"👥",l:"スタッフ"},{id:"shift",ico:"📅",l:"出勤簿"},{id:"fleet",ico:"🚗",l:"配車"},{id:"vehicle",ico:"🔧",l:"車両"},{id:"data",ico:"📊",l:"データ"}];

  if(!dbLoaded)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f3f4f6"}}><div style={{textAlign:"center"}}><div style={{width:48,height:48,border:"4px solid #e5e7eb",borderTopColor:"#2563eb",borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto 12px"}}></div><p style={{color:"#64748b",fontSize:13}}>データ読込中...</p></div></div>;

  return <div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
    {SB_ENABLED&&<div className="sync-desktop"><SyncBadge connected={sbConnected}/></div>}
    {showOP&&<OPScreen reservations={data} today={today} shifts={shifts} fleet={fleet} onFleetChange={setFleetSync} onClose={()=>setShowOP(false)} vehicles={vehicles} staff={staff} resOpts={resOpts}/>}
    <div style={{display:showOP?"none":"flex",flex:1,overflow:"hidden",flexDirection:"column"}}>
      <div className="top-nav">
        {navItems.filter(n=>n.id==="import"||n.id==="vehicle"||n.id==="staff"||data.length>0).map(n=><button key={n.id} onClick={()=>setTab(n.id)} className={tab===n.id?"active":""}><span className="ico">{n.ico}</span>{n.l}</button>)}
        {data.length>0&&<button onClick={()=>setShowOP(true)} style={{color:"#60a5fa"}}><span className="ico">📋</span>OP</button>}
        {SB_ENABLED&&<SyncBadge connected={sbConnected} inline={true}/>}
      </div>
      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
      <div className="sidebar">
        <div style={{width:36,height:36,borderRadius:8,background:"linear-gradient(135deg,#3b82f6,#1d4ed8)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:14,marginBottom:8}}>S</div>
        {navItems.filter(n=>n.id==="import"||n.id==="vehicle"||n.id==="staff"||data.length>0).map(n=><button key={n.id} onClick={()=>setTab(n.id)} className={tab===n.id?"active":""}><span className="ico">{n.ico}</span>{n.l}</button>)}
        {data.length>0&&<button onClick={()=>setShowOP(true)} style={{marginTop:4,background:"linear-gradient(135deg,#1e40af,#2563eb)",color:"#fff",borderRadius:10}}><span className="ico">📋</span><span style={{fontSize:8}}>OP</span></button>}
      </div>
      <div className="main-area" style={{flex:1,overflow:tab==="fleet"?"hidden":"auto",padding:tab==="fleet"?0:12,display:"flex",flexDirection:"column"}}>
        {tab!=="fleet"&&<div style={{marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,flexShrink:0}}>
          <div className="flex items-center gap-2"><div style={{width:28,height:28,borderRadius:6,background:"linear-gradient(135deg,#3b82f6,#1d4ed8)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:12}}>S</div><div><div className="font-bold text-sm text-gray-900">SPK タスク管理</div>{data.length>0&&<div className="text-xs text-gray-500 flex items-center gap-1">{data.length}件{Object.entries(oc).map(([k,v])=><span key={k}><OBadge ota={k}/>{v}</span>)}</div>}</div></div>
          {data.length>0&&<button onClick={()=>setShowOP(true)} className="px-3 py-1.5 rounded-lg text-xs font-bold text-white shadow" style={{background:"linear-gradient(135deg,#1e40af,#2563eb)"}}>📋 OPシート</button>}
        </div>}
        <div className="fade-in" style={{flex:1,minHeight:0,display:tab==="fleet"?"flex":"block",flexDirection:"column"}}>
          {tab==="import"&&<CSVPanel onImport={imp} onUpdatePlaces={updatePlaces} dataCount={data.length} pendingPlaces={pendingPlaces} onSetPendingPlaces={setPendingPlaces} files={csvFiles} setFiles={setCsvFiles} logs={csvLogs} setLogs={setCsvLogs} placeLogs={csvPlaceLogs} setPlaceLogs={setCsvPlaceLogs}/>}
          {tab==="staff"&&<StaffManager staff={staff} onStaffChange={setStaffSync} onDeleteStaff={(name)=>DB.deleteStaff(name)}/>}
          {tab==="shift"&&<ShiftCalendar shifts={shifts} onShiftsChange={setShiftsSync} today={today} staff={staff} sbSaveShift={DB.saveShift}/>}
          {tab==="fleet"&&<FleetTimeline data={data} fleet={fleet} onFleetChange={setFleetSync} today={today} maintenance={maintenance} onMaintenanceChange={setMaintenance} vehicles={vehicles} vehicleClasses={vehicleClasses} onAddReservation={addReservation} onBulkAddReservation={bulkAddReservation} onCancelReservation={cancelReservation} onReassignVehicle={reassignVehicle}/>}
          {tab==="vehicle"&&<VehicleManager vehicles={vehicles} onVehiclesChange={setVehiclesSync} vehicleClasses={vehicleClasses} onDeleteVehicle={(code)=>DB.deleteVehicle(code)}/>}
          {tab==="data"&&data.length>0&&<DataTable data={data}/>}
        </div>
      </div>
    </div>
    </div>
  </div>;
}

function Root(){
  const[auth,setAuth]=useState(!SB_ENABLED||localStorage.getItem("spk_auth")==="1");
  if(!auth)return <LoginScreen onLogin={()=>setAuth(true)}/>;
  return <App/>;
}
ReactDOM.render(<Root/>,document.getElementById("root"));
</script>
</body>
</html>
