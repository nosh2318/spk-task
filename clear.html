<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Cache Clear</title></head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;background:#f0f2f5">
<div id="msg" style="text-align:center;font-size:18px;font-weight:700;color:#1e293b">キャッシュクリア中...</div>
<script>
(async function(){
  var msg=document.getElementById('msg');
  try{
    if('serviceWorker' in navigator){
      var regs=await navigator.serviceWorker.getRegistrations();
      for(var r of regs){await r.unregister();}
      msg.textContent='SW解除完了 ('+regs.length+'件)...キャッシュ削除中';
    }
    if('caches' in window){
      var keys=await caches.keys();
      for(var k of keys){await caches.delete(k);}
      msg.textContent='キャッシュ削除完了 ('+keys.length+'件)...リダイレクト中';
    }
    localStorage.setItem('sw_cache_ver','spk-v451');
  }catch(e){msg.textContent='エラー: '+e.message;}
  setTimeout(function(){location.href='/';},1000);
})();
</script>
</body></html>
