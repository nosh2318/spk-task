<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>HANDYMAN 札幌 打刻</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', sans-serif;
    background: linear-gradient(160deg, #1a1a2e, #16213e, #0f3460);
    min-height: 100vh; min-height: 100dvh;
    color: white; display: flex; flex-direction: column;
  }
  .header { padding: 28px 20px 8px; text-align: center; }
  .header .store { font-size: 11px; letter-spacing: 3px; color: rgba(255,255,255,.5); margin-bottom: 6px; }
  .header .title { font-size: 24px; font-weight: 900; }
  .date-box { text-align: center; font-size: 13px; color: rgba(255,255,255,.55); padding: 6px 0 16px; }
  .main { flex:1; padding: 0 20px 32px; max-width: 420px; margin: 0 auto; width: 100%; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: rgba(255,255,255,.4); margin-bottom: 10px; }
  .name-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 24px; min-height: 50px; }
  .name-btn {
    padding: 14px 6px; border-radius: 12px;
    border: 2px solid rgba(255,255,255,.15);
    background: rgba(255,255,255,.08); color: rgba(255,255,255,.8);
    font-size: 13px; font-weight: 700; cursor: pointer; text-align: center;
    transition: all .15s;
  }
  .name-btn.sel { border-color: #60a5fa; background: rgba(96,165,250,.25); color: #fff; }
  .status-row { display: flex; gap: 12px; margin-bottom: 20px; }
  .st-box { flex:1; text-align:center; padding:12px 8px; border-radius:12px; background:rgba(255,255,255,.06); }
  .st-box.in  { background: rgba(16,185,129,.2); }
  .st-box.out { background: rgba(239,68,68,.2); }
  .st-box .lbl { font-size:10px; color:rgba(255,255,255,.5); font-weight:600; margin-bottom:5px; }
  .st-box .tm  { font-size:22px; font-weight:900; color:rgba(255,255,255,.2); }
  .st-box.in  .tm { color:#34d399; }
  .st-box.out .tm { color:#f87171; }
  .recv { text-align:center; font-size:11px; color:#34d399; font-weight:700; margin-top:6px; margin-bottom:12px; }
  .punch-btn {
    width:100%; padding:22px; border-radius:18px; border:none;
    font-size:19px; font-weight:900; cursor:pointer; margin-bottom:12px;
    transition: all .15s;
  }
  .punch-btn:active { transform: scale(.97); }
  .punch-btn.in  { background: linear-gradient(135deg,#059669,#10b981); color:#fff; box-shadow:0 6px 20px rgba(5,150,105,.4); }
  .punch-btn.out { background: linear-gradient(135deg,#dc2626,#ef4444); color:#fff; box-shadow:0 6px 20px rgba(220,38,38,.4); }
  .punch-btn.done { background:rgba(255,255,255,.08); color:rgba(255,255,255,.45); font-size:15px; cursor:default; }
  .punch-btn:disabled { opacity:.5; cursor:not-allowed; }
  .msg { padding:14px 16px; border-radius:12px; font-size:14px; font-weight:700; text-align:center; margin-top:12px; }
  .msg.ok  { background:rgba(16,185,129,.2); color:#34d399; border:1px solid rgba(16,185,129,.3); }
  .msg.err { background:rgba(239,68,68,.2);  color:#f87171; border:1px solid rgba(239,68,68,.3); }
  .hint { text-align:center; color:rgba(255,255,255,.3); font-size:12px; padding-top:20px; }
  .back { display:block; text-align:center; color:rgba(255,255,255,.25); font-size:11px; padding:20px; text-decoration:none; }
  #errbox { color:#f87171; font-size:12px; padding:10px; text-align:center; }
  .kyogi-box { padding:14px 16px; border-radius:12px; background:rgba(251,191,36,.15); border:1px solid rgba(251,191,36,.3); color:#fbbf24; font-size:13px; font-weight:700; text-align:center; margin-bottom:12px; }
  .correct-btn { width:100%; padding:14px; border-radius:14px; border:2px solid rgba(251,191,36,.4); background:rgba(251,191,36,.08); color:#fbbf24; font-size:14px; font-weight:700; cursor:pointer; margin-bottom:12px; }
  .correct-form { background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.15); border-radius:14px; padding:16px; margin-bottom:12px; }
  .correct-form .flbl { font-size:11px; color:rgba(255,255,255,.45); font-weight:600; margin-bottom:6px; letter-spacing:1px; }
  .correct-form select, .correct-form input[type="time"], .correct-form textarea { width:100%; padding:10px 12px; border-radius:8px; border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.08); color:#fff; font-size:14px; margin-bottom:12px; -webkit-appearance:none; }
  .correct-form textarea { resize:none; height:72px; font-family:inherit; }
  .correct-form .sub-btn { width:100%; padding:14px; border-radius:12px; border:none; background:linear-gradient(135deg,#d97706,#f59e0b); color:#fff; font-size:15px; font-weight:900; cursor:pointer; }
  .correct-form .can-btn { width:100%; padding:10px; border-radius:12px; border:1px solid rgba(255,255,255,.2); background:transparent; color:rgba(255,255,255,.4); font-size:13px; font-weight:700; cursor:pointer; margin-top:8px; }
</style>
</head>
<body>
<div class="header">
  <div class="store">HANDYMAN SAPPORO</div>
  <div class="title">👊 出退勤 打刻</div>
</div>
<div class="date-box" id="dateBox">読み込み中...</div>

<div class="main">
  <div class="section-label">名前を選択</div>
  <div class="name-grid" id="nameGrid"><div id="errbox">読み込み中...</div></div>

  <div id="punchArea" style="display:none">
    <div class="status-row">
      <div class="st-box" id="inBox"><div class="lbl">出勤</div><div class="tm" id="inTm">--:--</div></div>
      <div class="st-box" id="outBox"><div class="lbl">退勤</div><div class="tm" id="outTm">--:--</div></div>
    </div>
    <div class="recv" id="recv" style="display:none">✅ 受領済（自己申告）</div>
    <button class="punch-btn in"  id="btnIn"  onclick="doPunch('in')">🟢 出勤打刻</button>
    <button class="punch-btn out" id="btnOut" onclick="doPunch('out')" style="display:none">🔴 退勤打刻</button>
    <div class="punch-btn done"   id="btnDone" style="display:none">✅ 本日の打刻完了</div>
    <div class="kyogi-box" id="kyogiBox" style="display:none"></div>
    <button class="correct-btn" id="btnCorrect" onclick="showCorrectForm()" style="display:none">✏️ 修正・残業申告</button>
    <div class="correct-form" id="correctForm" style="display:none">
      <div class="flbl">申告タイプ</div>
      <select id="correctType" onchange="onCorrectTypeChange()">
        <option value="出勤修正">出勤時間の修正</option>
        <option value="退勤修正">退勤時間の修正</option>
        <option value="残業申請">残業申請（退勤時間の延長）</option>
      </select>
      <div class="flbl" id="timeLabel">希望する時刻</div>
      <input type="time" id="correctTime">
      <div class="flbl">理由・コメント（必須）</div>
      <textarea id="correctComment" placeholder="例：実際は13:00に出勤しましたが打刻が遅れました"></textarea>
      <button class="sub-btn" onclick="submitCorrection()">📨 申告を送る</button>
      <button class="can-btn" onclick="hideCorrectForm()">キャンセル</button>
    </div>
    <div class="msg" id="msgBox" style="display:none"></div>
  </div>
  <div class="hint" id="hint">名前をタップしてください</div>
</div>
<a href="/" class="back">← アプリに戻る</a>

<script>
const SUPABASE_URL = "https://ckrxttbnawkclshczsia.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNrcnh0dGJuYXdrY2xzaGN6c2lhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4Nzg1NTAsImV4cCI6MjA4NzQ1NDU1MH0.kDC_UDVWvcrS97wzqQ3NXP79ewjgYwF4vSFdV7y06S8";
const TABLE = "spk_attendance";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let selName = "";
let punchData = null;

function tick() {
  const now = new Date();
  document.getElementById("dateBox").textContent =
    now.toLocaleDateString("ja-JP", { month:"long", day:"numeric", weekday:"short", timeZone:"Asia/Tokyo" }) +
    "　" + now.toLocaleTimeString("ja-JP", { hour:"2-digit", minute:"2-digit", timeZone:"Asia/Tokyo" });
}
tick(); setInterval(tick, 10000);

function getToday() { return new Date().toLocaleDateString("sv-SE", { timeZone:"Asia/Tokyo" }); }
function getNow()   { return new Date().toLocaleTimeString("ja-JP", { hour:"2-digit", minute:"2-digit", hour12:false, timeZone:"Asia/Tokyo" }); }

async function loadStaff() {
  try {
    const { data, error } = await sb.from("staff").select("name,type").eq("type","アルバイト").order("sort_order");
    const grid = document.getElementById("nameGrid");
    if (error || !data || !data.length) {
      grid.innerHTML = '<div id="errbox">読み込みエラー：' + (error?.message||"データなし") + '</div>';
      return;
    }
    grid.innerHTML = data.map(s =>
      `<button class="name-btn" onclick="pick('${s.name}')">${s.name}</button>`
    ).join("");
  } catch(e) {
    document.getElementById("nameGrid").innerHTML = '<div id="errbox">エラー: ' + e.message + '</div>';
  }
}

async function pick(name) {
  selName = name;
  document.querySelectorAll(".name-btn").forEach(b => b.classList.toggle("sel", b.textContent === name));
  document.getElementById("hint").style.display = "none";
  document.getElementById("punchArea").style.display = "block";
  document.getElementById("msgBox").style.display = "none";
  await refresh();
}

async function refresh() {
  const { data } = await sb.from(TABLE).select("*").eq("date", getToday()).eq("staff_name", selName).maybeSingle();
  punchData = data;
  const memo     = data?.memo || "";
  const isKyogi  = memo.indexOf("協議中") === 0;
  const isDone   = memo === "打刻";
  const isInOnly = memo === "打刻中" || memo === "仮申請";
  const dispIn   = data?.start_time || "";
  const dispOut  = data?.end_time   || "";

  document.getElementById("inTm").textContent  = dispIn  || "--:--";
  document.getElementById("outTm").textContent = dispOut || "--:--";
  document.getElementById("inBox").className   = "st-box" + (dispIn  ? " in"  : "");
  document.getElementById("outBox").className  = "st-box" + (dispOut ? " out" : "");
  document.getElementById("recv").style.display = (data?.approved && isDone) ? "block" : "none";

  ["btnIn","btnOut","btnDone","btnCorrect"].forEach(id => { document.getElementById(id).style.display = "none"; });
  document.getElementById("kyogiBox").style.display = "none";
  document.getElementById("correctForm").style.display = "none";

  if (isKyogi) {
    document.getElementById("kyogiBox").textContent = "⏳ 協議中：" + memo.replace(/^協議中:/, "");
    document.getElementById("kyogiBox").style.display = "block";
  } else if (isDone) {
    document.getElementById("btnDone").textContent = "✅ 本日の打刻完了　" + dispIn + " 〜 " + dispOut;
    document.getElementById("btnDone").style.display = "block";
    document.getElementById("btnCorrect").style.display = "block";
  } else if (isInOnly) {
    document.getElementById("btnOut").style.display = "block";
    document.getElementById("btnCorrect").style.display = "block";
  } else {
    document.getElementById("btnIn").style.display = "block";
  }
}

async function doPunch(type) {
  if (!selName) return;
  const now = getNow();
  const label = type === "in" ? "出勤" : "退勤";
  if (!confirm(`${selName} の${label}打刻（${now}）\nよろしいですか？`)) return;
  const btn = document.getElementById(type === "in" ? "btnIn" : "btnOut");
  btn.disabled = true;
  const memo = punchData?.memo || "";
  const isInOnly = memo === "打刻中" || memo === "仮申請";
  try {
    if (type === "in") {
      if (punchData?.start_time && ["打刻中","打刻","仮申請"].includes(memo)) throw new Error("既に出勤打刻済みです");
      await sb.from(TABLE).upsert({
        date: getToday(), staff_name: selName,
        start_time: now, end_time: punchData?.end_time || "",
        approved: true, memo: "打刻中", absent: false
      }, { onConflict: "date,staff_name" });
      showMsg(`出勤打刻しました（${now}）`, true);
    } else {
      if (memo === "打刻" && punchData?.end_time) throw new Error("既に退勤打刻済みです");
      await sb.from(TABLE).upsert({
        date: getToday(), staff_name: selName,
        start_time: punchData?.start_time || "", end_time: now,
        approved: true, memo: "打刻", absent: false
      }, { onConflict: "date,staff_name" });
      showMsg(`退勤打刻しました（${now}）`, true);
    }
    await refresh();
  } catch(e) {
    showMsg(e.message || "エラーが発生しました", false);
    btn.disabled = false;
  }
}

function showCorrectForm() {
  document.getElementById("correctForm").style.display = "block";
  document.getElementById("btnCorrect").style.display = "none";
  onCorrectTypeChange();
}
function hideCorrectForm() {
  document.getElementById("correctForm").style.display = "none";
  document.getElementById("btnCorrect").style.display = "block";
}
function onCorrectTypeChange() {
  const type = document.getElementById("correctType").value;
  const lbl  = document.getElementById("timeLabel");
  const ct   = document.getElementById("correctTime");
  if (type === "出勤修正") {
    lbl.textContent = "希望する出勤時刻";
    ct.value = punchData?.start_time || getNow();
  } else {
    lbl.textContent = type === "残業申請" ? "希望する退勤時刻（残業後）" : "希望する退勤時刻";
    ct.value = punchData?.end_time || getNow();
  }
}
async function submitCorrection() {
  const type    = document.getElementById("correctType").value;
  const time    = document.getElementById("correctTime").value;
  const comment = document.getElementById("correctComment").value.trim();
  if (!comment) { alert("理由・コメントを入力してください"); return; }
  const memo = `協議中:【${type}→${time}】${comment}`;
  try {
    await sb.from(TABLE).upsert({
      date: getToday(), staff_name: selName,
      start_time: punchData?.start_time || "", end_time: punchData?.end_time || "",
      approved: false, memo: memo, absent: false
    }, { onConflict: "date,staff_name" });
    showMsg("申告を送りました。管理者が確認します。", true);
    hideCorrectForm();
    document.getElementById("correctComment").value = "";
    await refresh();
  } catch(e) {
    showMsg("エラー: " + e.message, false);
  }
}

function showMsg(text, ok) {
  const el = document.getElementById("msgBox");
  el.textContent = text;
  el.className = "msg " + (ok ? "ok" : "err");
  el.style.display = "block";
}

loadStaff();
</script>
</body>
</html>
